# deploy-trigger: 2026-04-09T16:04:08.327851+00:00

# CORS headers for static JSON — allows thebluefairy analytics dashboard

# Analytics dashboard — not indexed, not linked
[[headers]]
  for = "/analytics/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "DENY"
    Cache-Control = "no-store"

[[headers]]
  for = "/static/*.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/*.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET"
    Cache-Control = "public, max-age=300"

