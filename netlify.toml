[[redirects]]
  from = "https://nvmillfindoutmyself.com/patterns/*"
  to = "https://uas-patterns.pro/patterns/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.nvmillfindoutmyself.com/patterns/*"
  to = "https://uas-patterns.pro/patterns/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://nvmillfindoutmyself.com/pro/*"
  to = "https://uas-patterns.pro/pro/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.nvmillfindoutmyself.com/pro/*"
  to = "https://uas-patterns.pro/pro/:splat"
  status = 301
  force = true
# Everything else on nvmillfindoutmyself → uas-patterns.com
[[redirects]]
  from = "https://nvmillfindoutmyself.com"
  to = "https://uas-patterns.com/patterns-home/"
  status = 301
  force = true
[[redirects]]
  from = "https://www.nvmillfindoutmyself.com"
  to = "https://uas-patterns.com/patterns-home/"
  status = 301
  force = true
[[redirects]]
  from = "https://nvmillfindoutmyself.com/*"
  to = "https://uas-patterns.com/:splat"
  status = 301
  force = true
[[redirects]]
  from = "https://www.nvmillfindoutmyself.com/*"
  to = "https://uas-patterns.com/:splat"
  status = 301
