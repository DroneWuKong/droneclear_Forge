  to = "/:splat"
  status = 200
  force = true

# ── uasdash.com — UAS- cross-domain landing hub ─────────────────────────
# Bare uasdash.com + www → /hub/ on forgeprole, which serves the
# 5-domain portal page (uas-hub.html). Pass-through on sub-paths so
# someone typing uasdash.com/intel/ still reaches /intel/ on the Forge
# site. This domain is a vanity URL pointing at the hub; the canonical
# URL for the hub itself is https://uas-forge.com/hub/.
[[redirects]]
  from = "https://uasdash.com"
  to = "/hub/"
  status = 301
  force = true
[[redirects]]
  from = "https://www.uasdash.com"
  to = "/hub/"
  status = 301
  force = true
[[redirects]]
  from = "https://uasdash.com/*"
  to = "/:splat"
  status = 200
  force = true
[[redirects]]
  from = "https://www.uasdash.com/*"
  to = "/:splat"
  status = 200
  force = true

# ═══════════════════════════════════════════════════════════════════════════
# LEGACY DOMAIN GRANDFATHER — nvmill* → uas-* (301 for SEO transfer)
# ═══════════════════════════════════════════════════════════════════════════
# Keep these active for the grace period (~6-12 months) so bookmarks + Google
# index entries redirect cleanly. Remove once organic traffic from old domains
# drops to near-zero in analytics.

