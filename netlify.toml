# ═══════════════════════════════════════════════════════════════════════════
# DEFAULT NETLIFY SUBDOMAIN REDIRECTS — users should never see .netlify.app
# ═══════════════════════════════════════════════════════════════════════════
# This netlify.toml is shared by 3 Netlify sites (forgeprole, uas-patterns-pro,
# uas-intel). Each rule fires only when a request hits its own default
# subdomain — the other sites never see the wrong traffic because Netlify
# routes by host. Deploy previews (deploy-preview-N--SITE.netlify.app)
# won't match these rules — they use a different host format.

# forgeprole.netlify.app → uas-forge.com (apex + www)
[[redirects]]
  from = "https://forgeprole.netlify.app"
  to = "https://uas-forge.com"
  status = 301
  force = true
[[redirects]]
  from = "https://forgeprole.netlify.app/*"
  to = "https://uas-forge.com/:splat"
  status = 301
  force = true

# uas-patterns-pro.netlify.app → uas-patterns.pro
[[redirects]]
  from = "https://uas-patterns-pro.netlify.app"
  to = "https://uas-patterns.pro"
  status = 301
  force = true
[[redirects]]
  from = "https://uas-patterns-pro.netlify.app/*"
  to = "https://uas-patterns.pro/:splat"
  status = 301
  force = true

# uas-intel.netlify.app → uas-intel.com
[[redirects]]
  from = "https://uas-intel.netlify.app"
  to = "https://uas-intel.com"
  status = 301
  force = true
[[redirects]]
  from = "https://uas-intel.netlify.app/*"
  to = "https://uas-intel.com/:splat"
  status = 301
  force = true

# ═══════════════════════════════════════════════════════════════════════════
# NEW DOMAIN ROUTING — uas-* canonical domains (Phase 1 transition)
# ═══════════════════════════════════════════════════════════════════════════
#
# Architecture: ONE Netlify site (droneclear_Forge) serves multiple domains
# via host-based redirects. Each uas-* domain has its own landing page but
# shares the same build output underneath. Phase 2 may split uas-patterns.pro
# into its own Netlify site — until then, it's an alias routed to /patterns/.
#
# Rules are evaluated top-down; specific paths must come BEFORE catch-alls.

# ── uas-patterns.pro — Patterns Pro (paid/gated) ─────────────────────────
# Landing: uas-patterns.pro → /patterns/ (the Flags dashboard)
[[redirects]]
  from = "https://uas-patterns.pro"
  to = "/patterns/"
  status = 301
  force = true
[[redirects]]
  from = "https://www.uas-patterns.pro"
  to = "/patterns/"
  status = 301
  force = true
# Pass-through: keep the domain in the URL bar, serve same-path content
[[redirects]]
  from = "https://uas-patterns.pro/*"
  to = "/:splat"
  status = 200
  force = true
[[redirects]]
  from = "https://www.uas-patterns.pro/*"
  to = "/:splat"
  status = 200
  force = true

# ── uas-patterns.com — Patterns free public pages ────────────────────────
# Landing: uas-patterns.com → /patterns-home/ (PIE hub)
[[redirects]]
  from = "https://uas-patterns.com"
  to = "/patterns-home/"
  status = 301
  force = true
[[redirects]]
  from = "https://www.uas-patterns.com"
  to = "/patterns-home/"
  status = 301
  force = true
[[redirects]]
  from = "https://uas-patterns.com/*"
  to = "/:splat"
  status = 200
  force = true
[[redirects]]
  from = "https://www.uas-patterns.com/*"
  to = "/:splat"
  status = 200
  force = true

# ── uas-intel.com — Intel section ────────────────────────────────────────
[[redirects]]
  from = "https://uas-intel.com"
