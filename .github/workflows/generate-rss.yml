name: Generate RSS Feeds

on:
  push:
    paths:
      - 'DroneClear Components Visualizer/static/data/flags.json'
      - 'DroneClear Components Visualizer/static/pie_brief.json'
      - 'DroneClear Components Visualizer/static/pie_brief_history.json'
      - 'generate_flags_rss.py'
      - 'generate_brief_rss.py'
  workflow_dispatch:

jobs:
  rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate flags.xml
        run: python3 generate_flags_rss.py

      - name: Generate brief.xml
        run: python3 generate_brief_rss.py

      - name: Commit RSS feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "DroneClear Components Visualizer/static/flags.xml"
          git add "DroneClear Components Visualizer/static/brief.xml"
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "chore: regenerate RSS feeds [skip ci]"
          git push
