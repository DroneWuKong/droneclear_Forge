name: "⛏ Forge Community Miners — RotorBuilds/ArduPilot/DIYFPV/SAM/PilotInstitute (Daily 7:37AM CST)"

on:
  schedule:
    # 12:37 UTC = 7:37 AM CDT (DST) / 6:37 AM CST. Lands before 8 AM wake-up
    # even with GH Actions' usual 5-20 min scheduled-run queue delay. Minute
    # picked off :00/:30 to avoid global fleet pile-up.
    - cron: '37 12 * * *'
  workflow_dispatch:
    inputs:
      miner:
        description: 'Which miner to run (default: all)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - rotorbuilds
          - ardupilot_discourse
          - diyfpv_catalog
          - blue_uas
          - sam_gov
          - pilotinstitute
      max_records:
        description: 'Per-miner record cap'
        required: false
        default: '200'
        type: string
      dry_run:
        description: 'Miners only, skip normalizers'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  # ─── Validate: seeded JSON files parse and have expected shape ──────────
  validate-data:
    name: 'Validate seeded data files'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check data files parse as JSON
        run: |
          set -e
          cd "DroneClear Components Visualizer"
          for f in forge_manufacturer_status.json forge_alternatives.json forge_848_spec_sheets.json forge_compliance_events.json; do
            if [ -f "$f" ]; then
              python3 -c "import json; d=json.load(open('$f')); print(f'$f OK')"
            else
              echo "$f missing (may be optional)"
            fi
          done
      - name: Summarize manufacturer status roster
        run: |
          cd "DroneClear Components Visualizer"
          python3 - <<'PY'
          import json
          d = json.load(open('forge_manufacturer_status.json'))
          mfgs = d.get('manufacturers', {})
          from collections import Counter
          status_counts = Counter(r.get('status', 'unknown') for r in mfgs.values())
          low_conf = [s for s, r in mfgs.items() if r.get('confidence') == 'medium' or r.get('confidence') == 'low']
          print(f"Total vendors: {len(mfgs)}")
          print(f"Status breakdown: {dict(status_counts)}")
          print(f"Needs audit (low/medium confidence): {len(low_conf)}")
          for s in low_conf[:15]:
              print(f"  - {s}")
          PY

  # ─── Smoke: mining framework imports and configures cleanly ─────────────
  smoke-miners:
    name: 'Smoke-check mining framework'
    runs-on: ubuntu-latest
    needs: validate-data
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install mining deps
        run: pip install -r tools/mining/requirements.txt
      - name: Import check all miners
        run: |
          set -e
          cd tools/mining
          python3 -c "
          from miners.rotorbuilds import RotorBuildsMiner
          from miners.ardupilot_discourse import ArduPilotDiscourseMiner
          from miners.blue_uas import BlueUASMiner
          from miners.sam_gov import SamGovMiner
          from miners.diyfpv_catalog import DiyfpvCatalogMiner
          for cls in [RotorBuildsMiner, ArduPilotDiscourseMiner, BlueUASMiner, SamGovMiner, DiyfpvCatalogMiner]:
              cfg = cls.default_config()
              print(f'{cls.__name__:32s} base={cfg.base_url:42s} min_interval={cfg.min_request_interval_sec}s')
          print('ALL MINER CONFIGS VALID')
          "
      - name: Import check normalizers
        run: |
          set -e
          cd tools/mining
          python3 -c "
          import sys; sys.path.insert(0, '../..')
          from mining.normalizers import aggregate_cooccurrence
          from mining.normalizers import ardupilot_to_cooccurrence
          from mining.normalizers import sam_gov_to_solicitations
          from mining.normalizers import diyfpv_to_prices
          from mining.normalizers import blue_uas_to_cleared
          from mining.normalizers import parts_canonical
          from mining.normalizers import platform_cooccurrence
          print('ALL NORMALIZER IMPORTS VALID')
          "
      - name: Validate orchestrator
        run: |
          python3 tools/mining/run_all.py --help || echo "orchestrator --help exited non-zero (scaffold)"

  # ─── Daily report: auto-generated markdown summary for wake-up review ──
  daily-report:
    name: 'Generate daily roster report'
    runs-on: ubuntu-latest
    needs: [validate-data, smoke-miners]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate report
        run: |
          mkdir -p .reports
          python3 - <<'PY'
          import json, os
          from datetime import datetime
          from collections import Counter

          d = json.load(open('DroneClear Components Visualizer/forge_manufacturer_status.json'))
          mfgs = d.get('manufacturers', {})
          sheets = json.load(open('DroneClear Components Visualizer/forge_848_spec_sheets.json'))

          lines = []
          lines.append(f"# Forge Roster Report — {datetime.utcnow().strftime('%Y-%m-%d %H:%M UTC')}")
          lines.append("")
          lines.append(f"**Total vendors tracked:** {len(mfgs)}  ")
          lines.append(f"**§848 spec sheets indexed:** {len(sheets.get('spec_sheets', []))}")
          lines.append("")

          lines.append("## Status breakdown")
          status_counts = Counter(r.get('status', 'unknown') for r in mfgs.values())
          for k, v in sorted(status_counts.items(), key=lambda x: -x[1]):
              lines.append(f"- **{k}**: {v}")
          lines.append("")

          lines.append("## Vendors needing audit")
          low_conf = [(s, r) for s, r in mfgs.items() if r.get('confidence') in ('medium', 'low')]
          if low_conf:
              for s, r in low_conf:
                  flags = ', '.join(r.get('risk_flags', []) or ['—'])
                  lines.append(f"- **{r.get('name', s)}** — confidence: {r.get('confidence')} — flags: {flags}")
          else:
              lines.append("_None — all entries have high confidence._")
          lines.append("")

          lines.append("## Recent M&A events")
          ma_events = []
          for s, r in mfgs.items():
              for ev in (r.get('m_a_history') or []):
                  ma_events.append((ev.get('approx_year', '?'), r.get('name', s), ev))
          for year, name, ev in sorted(ma_events, key=lambda x: str(x[0]), reverse=True):
              lines.append(f"- **{year}** — {name}: {ev.get('event', 'event')} of {ev.get('target', '?')}")
          lines.append("")

          lines.append("## Vendors with leadership data")
          with_leaders = [(s, r) for s, r in mfgs.items() if r.get('leadership')]
          for s, r in with_leaders:
              leaders = r['leadership']
              lines.append(f"- **{r.get('name', s)}** — {', '.join(l.get('title', '?') + ': ' + l.get('name', '?') for l in leaders)}")
          lines.append("")

          report = "\n".join(lines)
          with open('.reports/roster-report.md', 'w') as f:
              f.write(report)
          print(report)
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: forge-roster-report-${{ github.run_id }}
          path: .reports/roster-report.md
          if-no-files-found: warn

  # ─── API miners: ArduPilot Discourse + DIYFPV (safe for daily schedule) ──
  # These use clean public APIs / JSON endpoints — no DOM scraping, no
  # robots.txt concerns. Run daily and commit results + normalizer output.
  api-miners:
    name: 'ArduPilot Discourse + DIYFPV catalog (daily)'
    runs-on: ubuntu-latest
    needs: smoke-miners
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.miner == 'all' || inputs.miner == 'ardupilot_discourse' || inputs.miner == 'diyfpv_catalog'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r tools/mining/requirements.txt

      - name: Run ArduPilot Discourse miner
        if: inputs.miner == 'all' || inputs.miner == 'ardupilot_discourse' || github.event_name == 'schedule'
        run: |
          MAX="${{ inputs.max_records || '300' }}"
          python3 tools/mining/run_all.py --miner ardupilot_discourse --max $MAX --dry

      - name: Run DIYFPV catalog miner
        if: inputs.miner == 'all' || inputs.miner == 'diyfpv_catalog' || github.event_name == 'schedule'
        run: |
          MAX="${{ inputs.max_records || '300' }}"
          python3 tools/mining/run_all.py --miner diyfpv_catalog --max $MAX --dry

      - name: Run normalizers
        if: inputs.dry_run != 'true'
        run: |
          cd tools/mining
          python3 -c "
          import sys
          sys.path.insert(0, '../..')
          from mining.normalizers import aggregate_cooccurrence, ardupilot_to_cooccurrence, diyfpv_to_prices
          ardupilot_to_cooccurrence.main()
          diyfpv_to_prices.main()
          aggregate_cooccurrence.main()
          "

      - name: Commit normalizer output
        if: inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            "DroneClear Components Visualizer/forge_co_occurrence.json" \
            "DroneClear Components Visualizer/forge_database.json" \
            tools/mining/output/raw/ || true
          if git diff --staged --quiet; then
            echo "No changes from API miners — nothing to commit."
          else
            git commit -m "data(mining): ardupilot+diyfpv normalizer run — $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-mining-output-${{ github.run_id }}
          path: tools/mining/output/raw/
          if-no-files-found: warn

  # ─── DOM miners: RotorBuilds + SAM.gov (workflow_dispatch only) ──────────
  # RotorBuilds requires DOM parsing; SAM.gov requires API key secret.
  # Both are dispatch-only until fully validated in production.
  dom-miners:
    name: 'RotorBuilds + SAM.gov (dispatch only)'
    runs-on: ubuntu-latest
    needs: smoke-miners
    if: >
      github.event_name == 'workflow_dispatch' &&
      (inputs.miner == 'all' || inputs.miner == 'rotorbuilds' || inputs.miner == 'sam_gov')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r tools/mining/requirements.txt

      - name: Run selected DOM/key miner
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
        run: |
          MINER="${{ inputs.miner }}"
          MAX="${{ inputs.max_records }}"
          DRY="${{ inputs.dry_run }}"
          ARGS="--max $MAX"
          if [ "$MINER" != "all" ]; then ARGS="$ARGS --miner $MINER"; fi
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry"; fi
          python3 tools/mining/run_all.py $ARGS

      - name: Commit output
        if: inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            "DroneClear Components Visualizer/forge_co_occurrence.json" \
            "DroneClear Components Visualizer/forge_database.json" \
            "DroneClear Components Visualizer/solicitations.json" \
            tools/mining/output/raw/ || true
          if git diff --staged --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "data(mining): dom-miners run — $(date -u '+%Y-%m-%d') [skip ci]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dom-mining-output-${{ github.run_id }}
          path: tools/mining/output/raw/
          if-no-files-found: warn

  # ─── Pilot Institute miner: runs daily, writes to dfr_master.json ───────
  pilotinstitute-miner:
    name: 'Mine Pilot Institute DFR articles'
    runs-on: ubuntu-latest
    # Run on schedule always; on dispatch only if miner == 'all' or 'pilotinstitute'
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' &&
       (inputs.miner == 'all' || inputs.miner == 'pilotinstitute'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Pilot Institute miner
        run: |
          MAX="${{ inputs.max_records || '150' }}"
          DRY="${{ inputs.dry_run || 'false' }}"
          ARGS="--max $MAX"
          if [ "$DRY" = "true" ]; then ARGS="$ARGS --dry"; fi
          cd tools/mining
          python3 miners/mine_pilotinstitute.py $ARGS

      - name: Commit updated dfr_master.json and raw output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dfr/dfr_master.json data/dfr/raw/pilotinstitute_*.json || true
          if git diff --staged --quiet; then
            echo "No new Pilot Institute records — nothing to commit."
          else
            COUNT=$(git diff --staged --stat | grep pilotinstitute | head -1)
            git commit -m "data(dfr): mine_pilotinstitute — $COUNT [skip ci]"
            git push
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pilotinstitute-raw-${{ github.run_id }}
          path: data/dfr/raw/pilotinstitute_*.json
          if-no-files-found: warn
