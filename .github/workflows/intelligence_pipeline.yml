name: Wingman Intelligence Pipeline
 
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to run'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - analyze-only
          - mine-all-gaps
          - blueuas
          - sbir
          - troubleshooting
 
jobs:
  daily-intelligence:
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.mode == 'daily' || github.event.inputs.mode == 'analyze-only' || github.event.inputs.mode == 'mine-all-gaps'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Forge
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Run gap analysis
        env:
          ANALYTICS_ADMIN_KEY: ${{ secrets.ANALYTICS_ADMIN_KEY }}
          FORGE_SITE: https://forgeprole.netlify.app
        run: |
          echo "=== WINGMAN DAILY INTELLIGENCE ==="
          echo "Step 1: Fetching analytics and analyzing gaps..."
          python3 miners/mine_from_analytics.py --analyze --days 7 || echo "Analytics analyze failed (non-fatal)"
 
      - name: Mine solutions for top gaps
        if: github.event.inputs.mode != 'analyze-only'
        env:
          ANALYTICS_ADMIN_KEY: ${{ secrets.ANALYTICS_ADMIN_KEY }}
          FORGE_SITE: https://forgeprole.netlify.app
        run: |
          echo "Step 2: Mining solutions for top 3 gaps..."
          python3 miners/mine_from_analytics.py --mine --top 3 --days 7 || echo "Gap mining failed (non-fatal)"
 
      - name: Auto-commit and notify
        if: always()
        env:
          NOTIFY_EMAIL: jeremiah@midwestniceuas.com
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "CHANGES=none" >> $GITHUB_ENV
          else
            SUMMARY=$(git diff --staged --stat)
            echo "CHANGES<<EOF" >> $GITHUB_ENV
            echo "$SUMMARY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            git commit -m "chore(miners): daily intelligence update $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
 
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Forge Intel Daily - ${{ job.status }} - $(date -u +%Y-%m-%d)"
          to: jeremiah@midwestniceuas.com
          from: Forge Intelligence Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            Wingman Daily Intelligence Pipeline - ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
 
            Changes committed:
            ${{ env.CHANGES }}
        continue-on-error: true
 
      - name: Summary
        if: always()
        run: |
          echo "## Wingman Daily Intelligence Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "miners/.analytics_output" ]; then
            LATEST_GAP=$(ls -t miners/.analytics_output/gap_analysis_*.json 2>/dev/null | head -1)
            if [ -n "$LATEST_GAP" ]; then
              echo "### Top Gaps" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              python3 miners/format_gap_summary.py "$LATEST_GAP" >> $GITHUB_STEP_SUMMARY 2>&1
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No analytics output generated" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changes:** ${{ env.CHANGES }}" >> $GITHUB_STEP_SUMMARY
 
  weekly-enrichment:
    if: github.event.schedule == '0 4 * * 0' || github.event.inputs.mode == 'weekly'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout Forge
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Refresh Blue UAS list
        run: |
          echo "=== WEEKLY ENRICHMENT ==="
          echo "Step 1: Blue UAS compliance data..."
          python3 miners/mine_blueuas.py || echo "Blue UAS mine failed (non-fatal)"
 
      - name: Mine SBIR grants
        run: |
          echo "Step 2: SBIR grants..."
          python3 miners/mine_sbir.py || echo "SBIR mine failed (non-fatal)"
 
      - name: Mine news and funding
        run: |
          echo "Step 3: DroneLife news/funding/contracts..."
          python3 miners/mine_dronelife.py || echo "DroneLife mine failed (non-fatal)"
 
      - name: Mine community troubleshooting
        run: |
          echo "Step 4: Community troubleshooting..."
          python3 miners/troubleshooting/mine_troubleshooting.py || echo "TS mine failed (non-fatal)"
 
      - name: Analytics-driven mining (top 5 gaps)
        env:
          ANALYTICS_ADMIN_KEY: ${{ secrets.ANALYTICS_ADMIN_KEY }}
          FORGE_SITE: https://forgeprole.netlify.app
        run: |
          echo "Step 5: Analytics gap mining..."
          python3 miners/mine_from_analytics.py --mine --top 5 --days 30 || echo "Analytics mine failed (non-fatal)"
 
      - name: Merge all mined entries into forge_intel.json
        run: |
          echo "Step 6: Merging mined entries..."
          python3 miners/merge_mined_entries.py || echo "Merge failed (non-fatal)"
 
      - name: Run mine_all.py for full consolidation
        run: |
          echo "Step 7: Full consolidation via mine_all.py..."
          python3 miners/mine_all.py || echo "mine_all failed (non-fatal)"
 
      - name: Auto-commit all changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "CHANGES=none" >> $GITHUB_ENV
          else
            SUMMARY=$(git diff --staged --stat)
            echo "CHANGES<<EOF" >> $GITHUB_ENV
            echo "$SUMMARY" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
            git commit -m "chore(miners): weekly enrichment $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
 
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Forge Intel Weekly - ${{ job.status }} - $(date -u +%Y-%m-%d)"
          to: jeremiah@midwestniceuas.com
          from: Forge Intelligence Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            Wingman Weekly Enrichment - ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
 
            Miners executed: Blue UAS, SBIR, DroneLife, Troubleshooting, Analytics
 
            Changes committed:
            ${{ env.CHANGES }}
        continue-on-error: true
 
      - name: Weekly Summary
        if: always()
        run: |
          echo "## Weekly Enrichment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u +%Y-%m-%d) | **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Miner | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Blue UAS | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "| SBIR Grants | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "| DroneLife News | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "| Community TS | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "| Analytics Mining | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "| Merge + Consolidation | Ran |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Changes:** ${{ env.CHANGES }}" >> $GITHUB_STEP_SUMMARY
 
  single-miner:
    if: github.event.inputs.mode == 'blueuas' || github.event.inputs.mode == 'sbir' || github.event.inputs.mode == 'troubleshooting'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Forge
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Run selected miner
        env:
          ANALYTICS_ADMIN_KEY: ${{ secrets.ANALYTICS_ADMIN_KEY }}
          FORGE_SITE: https://forgeprole.netlify.app
        run: |
          case "${{ github.event.inputs.mode }}" in
            blueuas)
              echo "Running Blue UAS miner..."
              python3 miners/mine_blueuas.py
              ;;
            sbir)
              echo "Running SBIR miner..."
              python3 miners/mine_sbir.py
              ;;
            troubleshooting)
              echo "Running community troubleshooting miner..."
              python3 miners/troubleshooting/mine_troubleshooting.py
              ;;
          esac
 
      - name: Auto-commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore(miners): ${{ github.event.inputs.mode }} run $(date -u +%Y-%m-%d) [skip ci]"
            git push
          fi
 
      - name: Send email notification
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "Forge Miner: ${{ github.event.inputs.mode }} - ${{ job.status }}"
          to: jeremiah@midwestniceuas.com
          from: Forge Intelligence Pipeline <${{ secrets.SMTP_USER }}>
          body: |
            Single miner run: ${{ github.event.inputs.mode }} - ${{ job.status }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        continue-on-error: true
