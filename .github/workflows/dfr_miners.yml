name: DFR Feed Miners

on:
  schedule:
    # Daily miners — 6 AM UTC
    - cron: '0 6 * * *'
    # Weekly miners — Sunday 7 AM UTC
    - cron: '0 7 * * 0'
  workflow_dispatch:

jobs:

  # ─── DAILY MINERS ────────────────────────────────────────────────────────────

  mine-police1-dfr:
    name: "M-02 | Police1 / PoliceMag DFR"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 feedparser
      - name: Run miner
        run: python miners/dfr/police1_dfr.py
        # TODO: implement miners/dfr/police1_dfr.py
        # Targets:
        #   https://www.police1.com/drones/ (RSS or HTML scrape)
        #   https://www.policemag.com (filter drone/DFR tags)
        # Output: data/dfr/raw/police1_YYYY-MM-DD.json
      - uses: actions/upload-artifact@v4
        with:
          name: police1-dfr-${{ github.run_id }}
          path: data/dfr/raw/

  mine-dronedj-dfr:
    name: "M-03 | DroneDJ DFR Tag"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 feedparser
      - name: Run miner
        run: python miners/dfr/dronedj_dfr.py
        # TODO: implement miners/dfr/dronedj_dfr.py
        # Target: https://dronedj.com/guides/dfr/ + RSS feed filtered on 'dfr' tag
        # Output: data/dfr/raw/dronedj_YYYY-MM-DD.json
      - uses: actions/upload-artifact@v4
        with:
          name: dronedj-dfr-${{ github.run_id }}
          path: data/dfr/raw/

  mine-commercialuav-dfr:
    name: "M-04 | Commercial UAV News DFR Filter"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 feedparser
      - name: Run miner
        run: python miners/dfr/commercialuav_dfr.py
        # TODO: extend existing commercialuav miner — add DFR tag filter
        # Target: https://www.commercialuavnews.com/public-safety
        # Extend: miners/commercialuav.py — add vertical_tag='dfr' filter
        # Output: data/dfr/raw/commercialuav_dfr_YYYY-MM-DD.json

  # ─── WEEKLY MINERS ───────────────────────────────────────────────────────────

  mine-droneresponders:
    name: "M-01 | DRONERESPONDERS"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4
      - name: Run miner
        run: python miners/dfr/droneresponders.py
        # TODO: implement miners/dfr/droneresponders.py
        # Target: https://droneresponders.org (news section, case studies, resources)
        # Output: data/dfr/raw/droneresponders_YYYY-MM-DD.json

  mine-grants-gov-dfr:
    name: "G-01 | Grants.gov DFR Monitor"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run miner
        run: python miners/dfr/grants_gov_dfr.py
        # TODO: implement miners/dfr/grants_gov_dfr.py
        # API: https://www.grants.gov/web/grants/search-grants.html (public search API)
        # Keywords: ["UAS", "drone", "DFR", "unmanned aircraft", "first responder technology",
        #            "public safety drone", "drone as first responder"]
        # Output: data/dfr/raw/grants_gov_YYYY-MM-DD.json

  mine-route-fifty:
    name: "M-06 | Route Fifty / GovTech Municipal DFR"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests feedparser
      - name: Run miner
        run: python miners/dfr/route_fifty.py
        # TODO: implement miners/dfr/route_fifty.py
        # Targets:
        #   https://www.route-fifty.com/public-safety (RSS or HTML)
        #   https://www.govtech.com/public-safety/drones
        # Output: data/dfr/raw/route_fifty_YYYY-MM-DD.json

  # ─── NORMALIZATION + COMMIT ──────────────────────────────────────────────────

  normalize-and-commit:
    name: "Normalize + Commit DFR Data"
    runs-on: ubuntu-latest
    needs:
      - mine-police1-dfr
      - mine-dronedj-dfr
      - mine-commercialuav-dfr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: data/dfr/raw/
      - name: Normalize and tag
        run: python scripts/dfr/normalize.py
        # TODO: implement scripts/dfr/normalize.py
        # - Load all raw JSON from data/dfr/raw/
        # - Apply vertical_tag: 'dfr'
        # - Apply data_category tags: platform_intel | regulatory | grant | market_signal
        # - Deduplicate by URL + date
        # - Write to data/dfr/normalized/dfr_YYYY-MM-DD.json
        # - Merge into data/dfr/dfr_master.json (append, dedup)
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dfr/
          git diff --staged --quiet || git commit -m "chore(dfr): auto-update DFR feed data $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
