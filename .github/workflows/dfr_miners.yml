name: DFR Feed Miners

on:
  schedule:
    - cron: '0 6 * * *'   # Daily — 6 AM UTC
    - cron: '0 7 * * 0'   # Weekly — Sunday 7 AM UTC
  workflow_dispatch:

jobs:

  # ─── DAILY ───────────────────────────────────────────────────────────────────

  mine-police1-dfr:
    name: "M-02 | Police1 / PoliceMag DFR"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/police1_dfr.py
      - uses: actions/upload-artifact@v4
        with:
          name: police1-dfr-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-dronedj-dfr:
    name: "M-03 | DroneDJ DFR Tag"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/dronedj_dfr.py
      - uses: actions/upload-artifact@v4
        with:
          name: dronedj-dfr-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-commercialuav-dfr:
    name: "M-04 | Commercial UAV News DFR"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/commercialuav_dfr.py
      - uses: actions/upload-artifact@v4
        with:
          name: commercialuav-dfr-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-faa-beyond:
    name: "R-01 | FAA BEYOND Waiver Tracker"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/faa_beyond.py
      - uses: actions/upload-artifact@v4
        with:
          name: faa-beyond-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-dhs-ael:
    name: "R-03 | DHS AEL Reference"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/dhs_ael.py
      - uses: actions/upload-artifact@v4
        with:
          name: dhs-ael-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-nasao-whitepaper:
    name: "NASAO | White Paper Monitor"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/nasao_whitepaper.py
      - uses: actions/upload-artifact@v4
        with:
          name: nasao-wp-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-municipal-rfp:
    name: "G-06 | Municipal RFP / Known Programs"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/municipal_rfp.py
      - uses: actions/upload-artifact@v4
        with:
          name: municipal-rfp-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  # ─── WEEKLY ──────────────────────────────────────────────────────────────────

  mine-droneresponders:
    name: "M-01 | DRONERESPONDERS"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/droneresponders.py
      - uses: actions/upload-artifact@v4
        with:
          name: droneresponders-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-grants-gov-dfr:
    name: "G-01 | Grants.gov DFR Monitor"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/grants_gov_dfr.py
      - uses: actions/upload-artifact@v4
        with:
          name: grants-gov-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  mine-route-fifty:
    name: "M-06 | Route Fifty / GovTech"
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 7 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - run: python miners/dfr/route_fifty.py
      - uses: actions/upload-artifact@v4
        with:
          name: route-fifty-${{ github.run_id }}
          path: data/dfr/raw/
          if-no-files-found: warn

  # ─── NORMALIZE + COMMIT ──────────────────────────────────────────────────────

  normalize-and-commit:
    name: "Normalize + Commit DFR Data"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - mine-police1-dfr
      - mine-dronedj-dfr
      - mine-commercialuav-dfr
      - mine-faa-beyond
      - mine-dhs-ael
      - mine-nasao-whitepaper
      - mine-municipal-rfp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests beautifulsoup4 feedparser
      - name: Download all miner artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifact-staging/
          merge-multiple: true
      - name: Copy artifacts into raw dir
        run: |
          mkdir -p data/dfr/raw
          find artifact-staging/ -name "*.json" -exec cp {} data/dfr/raw/ \; 2>/dev/null || true
          echo "Raw files after merge:"
          ls data/dfr/raw/
      - name: Normalize and update master DB
        run: python scripts/dfr/normalize.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dfr/
          git diff --staged --quiet || git commit -m "chore(dfr): auto-update DFR feed data $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate-pie-flags:
    name: "PIE: Generate DFR Flags"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - normalize-and-commit
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests
      - name: Generate DFR PIE flags
        run: python3 scripts/dfr/generate_pie_flags.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "DroneClear Components Visualizer/pie_flags.json"
          git diff --staged --quiet || git commit -m "chore(pie): regenerate DFR flags $(date +%Y-%m-%d)"
          git pull --rebase origin master
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
