{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{% static 'base.css' %}?v=2">
    <link rel="stylesheet" href="{% static 'layout.css' %}?v=3">
    <link rel="stylesheet" href="{% static 'components.css' %}?v=2">
    <link rel="stylesheet" href="{% static 'utilities.css' %}?v=2">

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        (function () {
            const saved = localStorage.getItem('dc-theme');
            document.documentElement.setAttribute('data-theme', saved ? saved : 'dark');
        })();
    </script>
    <style>
        .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
        .stat-card { background: var(--surface-secondary, #1e1e3a); border-radius: 12px; padding: 20px 24px; border-left: 3px solid var(--accent, #4ECDC4); }
        .stat-value { font-size: 28px; font-weight: 700; color: var(--accent, #4ECDC4); font-family: 'JetBrains Mono', monospace; }
        .stat-label { font-size: 13px; color: var(--text-secondary, #aaa); margin-top: 4px; }
        .stat-sub { font-size: 11px; color: var(--text-muted, #666); margin-top: 2px; }
        .section-card { background: var(--surface-secondary, #1e1e3a); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
        .section-title { font-size: 15px; font-weight: 600; margin: 0 0 16px; display: flex; align-items: center; gap: 8px; }
        .bar-row { margin-bottom: 10px; }
        .bar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 3px; }
        .bar-label { max-width: 70%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-value { color: var(--accent, #4ECDC4); font-family: 'JetBrains Mono', monospace; font-weight: 600; }
        .bar-track { height: 6px; background: var(--surface-primary, #111); border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent, #4ECDC4); border-radius: 3px; transition: width 0.6s ease; }
        .bar-fill.warn { background: #ff6b6b; }
        .bar-sub { font-size: 10px; color: var(--text-muted, #666); margin-top: 2px; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .surface-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .surface-tab { padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; font-family: inherit; transition: all 0.2s; background: var(--surface-secondary, #1e1e3a); color: var(--text-secondary, #aaa); }
        .surface-tab.active { background: var(--accent, #4ECDC4); color: #111; }
        .period-select { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-color, #333); background: var(--surface-primary, #111); color: var(--text-primary, #eee); font-size: 13px; font-family: inherit; }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted, #666); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; display: block; color: var(--accent, #4ECDC4); opacity: 0.5; }
        .analytics-footer { margin-top: 32px; padding: 16px 0; border-top: 1px solid var(--border-color, #333); text-align: center; font-size: 11px; color: var(--text-muted, #666); }
        @media (max-width: 768px) { .two-col { grid-template-columns: 1fr; } }
    </style>
</head>

<body>
    <div class="app-container">

        <div class="sidebar-overlay hidden" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-text">Forge</span><span class="logo-sub">Powered by DroneClear</span>
                </div>
            </div>
            <nav class="sidebar-menu"
                style="border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 8px; padding-top: 16px;">
                <a href="/" class="btn btn-menu">
                    <i class="ph ph-command"></i> Mission Control
                </a>
                <a href="/builder/" class="btn btn-menu">
                    <i class="ph ph-magic-wand"></i> Model Builder
                </a>
                <a href="/guide/" class="btn btn-menu">
                    <i class="ph ph-list-checks"></i> Build Guide
                </a>
                <a href="/audit/" class="btn btn-menu">
                    <i class="ph ph-clipboard-text"></i> Build Audit
                </a>
                <a href="/academy/" class="btn btn-menu">
                    <i class="ph ph-graduation-cap"></i> FPV Academy
                </a>
                <a href="/platforms/" class="btn btn-menu">
                    <i class="ph ph-shield-check"></i> Platforms
                </a>
                <a href="/analytics/" class="btn btn-menu active">
                    <i class="ph ph-chart-line-up"></i> Analytics
                </a>
                <a href="https://nvmilldoitmyself.com" target="_blank" class="btn btn-menu">
                    <i class="ph ph-book-open-text"></i> Handbook
                </a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main-content">

            <header class="topbar">
                <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <button class="btn btn-icon mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('hidden');">
                            <i class="ph ph-list"></i>
                        </button>
                        <h2 style="margin: 0; font-size: 18px;"><i class="ph ph-chart-line-up" style="color: var(--accent);"></i> Usage Analytics</h2>
                    </div>
                    <div style="display: flex; gap: 8px; align-items: center;">
                        <div class="surface-tabs">
                            <button class="surface-tab active" onclick="switchSurface('handbook', this)">Handbook</button>
                            <button class="surface-tab" onclick="switchSurface('forge', this)">Forge</button>
                        </div>
                        <select class="period-select" id="periodSelect" onchange="loadDashboard()">
                            <option value="7">7 days</option>
                            <option value="14">14 days</option>
                            <option value="30">30 days</option>
                            <option value="90">90 days</option>
                        </select>
                    </div>
                </div>
            </header>

            <div style="padding: 24px;" id="dashboardContent">
                <div class="empty-state" id="loadingState">
                    <i class="ph ph-circle-notch ph-spin"></i>
                    <div style="font-size: 16px; margin-bottom: 8px;">Loading analytics...</div>
                    <div>Fetching data from Netlify Functions</div>
                </div>
            </div>

        </main>
    </div>

    <script>
    const API_BASE = 'https://nvmilldoitmyself.com/.netlify/functions/analytics-dashboard';
    let currentSurface = 'handbook';

    function switchSurface(surface, btn) {
        currentSurface = surface;
        document.querySelectorAll('.surface-tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        loadDashboard();
    }

    async function loadDashboard() {
        const days = document.getElementById('periodSelect').value;
        const container = document.getElementById('dashboardContent');
        container.innerHTML = '<div class="empty-state"><i class="ph ph-circle-notch"></i><div>Loading...</div></div>';

        try {
            const res = await fetch(`${API_BASE}?surface=${currentSurface}&days=${days}`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            
            if (currentSurface === 'handbook') {
                renderHandbook(container, data, days);
            } else {
                renderForge(container, data, days);
            }
        } catch (err) {
            container.innerHTML = `
                <div class="empty-state">
                    <i class="ph ph-cloud-slash"></i>
                    <div style="font-size: 16px; margin-bottom: 8px;">No data yet</div>
                    <div style="max-width: 400px; margin: 0 auto;">
                        Analytics just went live. Visit <a href="https://nvmilldoitmyself.com" target="_blank" style="color: var(--accent);">the Handbook</a> 
                        or <a href="/builder/" style="color: var(--accent);">the Builder</a> to generate your first events.
                        <br><br>
                        <span style="font-family: 'JetBrains Mono'; font-size: 11px; opacity: 0.5;">${err.message}</span>
                    </div>
                </div>`;
        }
    }

    function statCard(label, value, sub, warn) {
        return `<div class="stat-card" ${warn ? 'style="border-left-color: #ff6b6b;"' : ''}>
            <div class="stat-value" ${warn ? 'style="color: #ff6b6b;"' : ''}>${value}</div>
            <div class="stat-label">${label}</div>
            ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
        </div>`;
    }

    function barRow(label, value, max, sub, warn) {
        const pct = max > 0 ? (value / max) * 100 : 0;
        return `<div class="bar-row">
            <div class="bar-header">
                <span class="bar-label">${label}</span>
                <span class="bar-value" ${warn ? 'style="color: #ff6b6b;"' : ''}>${value.toLocaleString()}</span>
            </div>
            <div class="bar-track"><div class="bar-fill ${warn ? 'warn' : ''}" style="width: ${pct}%"></div></div>
            ${sub ? `<div class="bar-sub">${sub}</div>` : ''}
        </div>`;
    }

    function renderHandbook(el, data, days) {
        const o = data.overview || {};
        const maxViews = Math.max(...(data.top_pages || []).map(p => p.views), 1);
        const maxSearches = Math.max(...(data.top_searches || []).map(s => s.searches), 1);

        el.innerHTML = `
            <div class="analytics-grid">
                ${statCard('Total Views', (o.total_views || 0).toLocaleString(), `${days} day period`)}
                ${statCard('Unique Sessions', (o.unique_sessions || 0).toLocaleString())}
                ${statCard('Searches', (o.total_searches || 0).toLocaleString())}
                ${statCard('Days with Data', o.days_with_data || 0, `of ${days} requested`)}
            </div>
            <div class="two-col">
                <div class="section-card">
                    <h3 class="section-title"><i class="ph ph-file-text"></i> Top Pages</h3>
                    ${(data.top_pages || []).length > 0
                        ? (data.top_pages || []).map(p => barRow(p.path, p.views, maxViews)).join('')
                        : '<div style="color: var(--text-muted); font-size: 13px;">No page view data yet</div>'}
                </div>
                <div class="section-card">
                    <h3 class="section-title"><i class="ph ph-magnifying-glass"></i> Top Searches</h3>
                    ${(data.top_searches || []).length > 0
                        ? (data.top_searches || []).map(s => barRow(s.query, s.searches, maxSearches)).join('')
                        : '<div style="color: var(--text-muted); font-size: 13px;">No search data yet</div>'}
                </div>
            </div>
            <div class="analytics-footer">
                AI Wingman Analytics v1.0 — Self-hosted on Netlify · No cookies · No PII · GDPR compliant
                <br><span style="color: var(--accent);">Buddy up.</span>
            </div>`;
    }

    function renderForge(el, data, days) {
        const o = data.overview || {};
        const maxViews = Math.max(...(data.top_components || []).map(c => c.views), 1);
        const maxGaps = Math.max(...(data.database_gaps || []).map(g => g.occurrences), 1);

        el.innerHTML = `
            <div class="analytics-grid">
                ${statCard('Component Views', (o.total_views || 0).toLocaleString(), `${days} day period`)}
                ${statCard('Searches', (o.total_searches || 0).toLocaleString())}
                ${statCard('Filters Applied', (o.total_filters || 0).toLocaleString())}
                ${statCard('Comparisons', (o.total_comparisons || 0).toLocaleString())}
                ${statCard('Saves', (o.total_saves || 0).toLocaleString())}
                ${statCard('Sessions', (o.unique_sessions || 0).toLocaleString())}
            </div>
            <div class="two-col">
                <div class="section-card">
                    <h3 class="section-title"><i class="ph ph-lightning"></i> Most Viewed Components</h3>
                    ${(data.top_components || []).length > 0
                        ? (data.top_components || []).map(c => barRow(c.pid, c.views, maxViews)).join('')
                        : '<div style="color: var(--text-muted); font-size: 13px;">No component views yet</div>'}
                </div>
                <div class="section-card">
                    <h3 class="section-title"><i class="ph ph-warning-circle" style="color: #ff6b6b;"></i> Database Gaps — What Users Can't Find</h3>
                    <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 12px; font-style: italic;">
                        Searches that returned zero results. Add these to the parts database.
                    </div>
                    ${(data.database_gaps || []).length > 0
                        ? (data.database_gaps || []).map(g => barRow(g.query, g.occurrences, maxGaps, null, true)).join('')
                        : '<div style="color: var(--text-muted); font-size: 13px;">No gaps detected yet — good coverage!</div>'}
                </div>
            </div>
            <div class="analytics-footer">
                AI Wingman Analytics v1.0 — Self-hosted on Netlify · No cookies · No PII · GDPR compliant
                <br><span style="color: var(--accent);">Buddy up.</span>
            </div>`;
    }

    // Load on page ready
    loadDashboard();
    </script>

<!-- AI Wingman Analytics v1.0 — Forge — No cookies, no PII -->

</script>
</body>
</html>
