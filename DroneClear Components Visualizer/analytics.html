<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics — Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'base.css' %}?v=2">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('dc-theme')||'dark');})()</script>
<style>
:root{--bg:#0a0b10;--bg-card:#10141a;--bg-card2:#14191f;--border:#1e2530;--text:#c9d1d9;--text-dim:#8b949e;--text-bright:#e6edf3;--teal:#00d4ff;--red:#ff3b5c;--amber:#f59e0b;--green:#22c55e;--mono:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{overflow:auto!important;height:auto!important;-webkit-overflow-scrolling:touch}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.nav{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(10,11,16,0.95);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.nav-back{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text-dim);padding:8px 10px;cursor:pointer;display:flex;align-items:center;font-size:16px}
.nav-back:hover{border-color:var(--teal);color:var(--teal)}
.nav-title{font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:.04em}
.nav-sub{font-size:10px;color:var(--text-dim);margin-top:2px}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center}
#auth-gate{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:16px;padding:24px}
.auth-label{font-size:11px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
.auth-row{display:flex;gap:8px;width:100%;max-width:360px}
.auth-input{flex:1;padding:11px 14px;font-family:var(--mono);font-size:13px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none}
.auth-input:focus{border-color:var(--teal)}
.auth-btn{padding:11px 18px;background:var(--teal);color:#000;border:none;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer}
.auth-err{font-size:11px;color:var(--red)}
#dashboard{display:none;padding:16px;max-width:900px;margin:0 auto}
.range-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.range-tab{padding:6px 14px;font-family:var(--mono);font-size:11px;border:1px solid var(--border);border-radius:6px;background:none;color:var(--text-dim);cursor:pointer}
.range-tab.active{border-color:var(--teal);color:var(--teal)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.stat-val{font-size:1.5rem;font-weight:700;color:var(--text-bright);line-height:1}
.stat-label{font-size:9px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
.c-teal{color:var(--teal)!important}.c-amber{color:var(--amber)!important}.c-red{color:var(--red)!important}.c-green{color:var(--green)!important}
.section{font-size:10px;color:var(--text-dim);letter-spacing:.1em;text-transform:uppercase;margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.section::after{content:'';flex:1;height:1px;background:var(--border)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px}
/* Spark bar chart */
.spark{display:flex;align-items:flex-end;gap:3px;height:60px;width:100%}
.spark-col{display:flex;flex-direction:column;align-items:center;flex:1;gap:3px}
.spark-bar{width:100%;background:var(--teal);border-radius:2px 2px 0 0;min-height:2px;opacity:0.8}
.spark-bar.amber{background:var(--amber)}
.spark-lbl{font-size:7px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:28px;text-align:center}
/* Horizontal bar */
.hbar-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(30,37,48,0.5)}
.hbar-row:last-child{border-bottom:none}
.hbar-label{font-size:10px;color:var(--text);width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-bg{flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.hbar-fill{height:100%;background:var(--teal);border-radius:3px}
.hbar-val{font-size:10px;color:var(--text-dim);width:28px;text-align:right;flex-shrink:0}
/* Query list */
.q-item{padding:8px 0;border-bottom:1px solid rgba(30,37,48,0.6);display:flex;gap:8px;align-items:flex-start}
.q-item:last-child{border-bottom:none}
.q-text{flex:1;font-size:11px;color:var(--text);line-height:1.4;word-break:break-word}
.q-meta{font-size:9px;color:var(--text-dim);white-space:nowrap;text-align:right;flex-shrink:0}
.pill{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;background:rgba(0,212,255,.12);color:var(--teal)}
.empty{text-align:center;padding:32px;font-size:11px;color:var(--text-dim)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="nav">
  <button class="nav-back" onclick="history.back()"><i class="ph ph-caret-left"></i></button>
  <div>
    <div class="nav-title">ANALYTICS</div>
    <div class="nav-sub" id="nav-sub">Mission Control</div>
  </div>
  <div class="nav-right">
    <span id="spin" style="display:none"><span class="spinner"></span></span>
    <a href="/" style="color:var(--text-dim);font-size:18px;text-decoration:none;padding:6px"><i class="ph ph-command"></i></a>
  </div>
</div>

<div id="auth-gate">
  <div style="font-size:28px;margin-bottom:4px">📊</div>
  <div class="auth-label">Admin Key Required</div>
  <div class="auth-row">
    <input id="key-input" class="auth-input" type="password" placeholder="Enter analytics key…"
      onkeydown="if(event.key==='Enter')go()">
    <button class="auth-btn" onclick="go()">ENTER</button>
  </div>
  <div id="auth-err" class="auth-err" style="display:none">Invalid key</div>
</div>

<div id="dashboard">
  <div class="range-tabs">
    <button class="range-tab active" onclick="setR(7,this)">7d</button>
    <button class="range-tab" onclick="setR(14,this)">14d</button>
    <button class="range-tab" onclick="setR(30,this)">30d</button>
    <button class="range-tab" onclick="setR(90,this)">90d</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val c-teal" id="sq">—</div><div class="stat-label">Wingman Queries</div></div>
    <div class="stat-card"><div class="stat-val" id="ss">—</div><div class="stat-label">Sessions</div></div>
    <div class="stat-card"><div class="stat-val c-amber" id="si">—</div><div class="stat-label">Image Queries</div></div>
    <div class="stat-card"><div class="stat-val" id="sr">—</div><div class="stat-label">DB Searches</div></div>
    <div class="stat-card"><div class="stat-val" id="sc">—</div><div class="stat-label">Compares</div></div>
    <div class="stat-card"><div class="stat-val c-red" id="sg">—</div><div class="stat-label">Gap Searches</div></div>
    <div class="stat-card"><div class="stat-val c-amber" id="shb">—</div><div class="stat-label">Handbook Views</div></div>
    <div class="stat-card"><div class="stat-val c-green" id="st">—</div><div class="stat-label">Avg Turns</div></div>
  </div>

  <div class="section">Daily Activity</div>
  <div class="card"><div id="spark-daily" class="spark"></div></div>

  <div class="section">Wingman Query Categories</div>
  <div class="card" id="cats-list"></div>

  <div class="section">Recent Queries</div>
  <div class="card" style="padding:0;overflow:hidden">
    <div id="query-list" style="max-height:320px;overflow-y:auto;padding:8px 14px"></div>
  </div>
</div>

<script>
var KEY = localStorage.getItem('forge-analytics-key') || '';
var RANGE = 7;

window.addEventListener('DOMContentLoaded', function() {
  if (KEY) { document.getElementById('key-input').value = KEY; go(); }
});

function setR(n, btn) {
  RANGE = n;
  document.querySelectorAll('.range-tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if (KEY) go();
}

function go() {
  var k = document.getElementById('key-input').value.trim();
  if (!k) return;
  KEY = k;
  document.getElementById('auth-err').style.display = 'none';
  document.getElementById('spin').style.display = '';
  fetch('/.netlify/functions/analytics?range=' + RANGE, {headers:{'X-Admin-Key':k}})
    .then(function(r){ if(r.status===401){authFail();return null;} return r.json(); })
    .then(function(d){
      document.getElementById('spin').style.display = 'none';
      if (!d) return;
      localStorage.setItem('forge-analytics-key', k);
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      render(d);
    })
    .catch(function(e){
      document.getElementById('spin').style.display = 'none';
      console.error('Analytics fetch failed:', e);
    });
}

function authFail() {
  document.getElementById('spin').style.display = 'none';
  localStorage.removeItem('forge-analytics-key');
  document.getElementById('auth-gate').style.display = '';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('auth-err').style.display = '';
}

function fmt(n) { if (!n) return '0'; if (n >= 1000) return (n/1000).toFixed(1)+'k'; return ''+n; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(data) {
  var t = data.totals || {};
  var sum = data.summary || {};
  var daily = data.daily || {};
  var mo = data.thisMonth || {};

  // Stats
  document.getElementById('sq').textContent = fmt(t.queries);
  document.getElementById('ss').textContent = fmt(mo.sessions);
  document.getElementById('si').textContent = fmt(t.imageQueries);
  document.getElementById('sr').textContent = fmt(sum.totalSearches);
  document.getElementById('sc').textContent = fmt(sum.totalCompares);
  document.getElementById('st').textContent = mo.avgTurns || '—';

  var totalGaps=0, totalHb=0;
  Object.values(daily).forEach(function(d){
    totalGaps += ((d.forge||{}).gaps||0);
    totalHb += ((d.handbook||{}).views||0);
  });
  document.getElementById('sg').textContent = fmt(totalGaps);
  document.getElementById('shb').textContent = fmt(totalHb);

  // Spark chart — pure CSS/HTML, no Chart.js
  var dates = Object.keys(daily).sort();
  var qArr = dates.map(function(d){ return daily[d].count||0; });
  var pvArr = dates.map(function(d){ return daily[d].pageViews||0; });
  var maxVal = Math.max(1, Math.max.apply(null, qArr.map(function(v,i){ return v+(pvArr[i]||0); })));
  var sparkEl = document.getElementById('spark-daily');
  if (dates.length) {
    sparkEl.innerHTML = dates.map(function(d, i) {
      var qH = Math.round((qArr[i]/maxVal)*56);
      var pvH = Math.round((pvArr[i]/maxVal)*56);
      var lbl = d.slice(5);
      return '<div class="spark-col">'
        + (qArr[i] ? '<div class="spark-bar" style="height:'+qH+'px" title="'+qArr[i]+' queries"></div>' : '')
        + (pvArr[i] ? '<div class="spark-bar amber" style="height:'+pvH+'px" title="'+pvArr[i]+' events"></div>' : '')
        + '<div class="spark-lbl">'+lbl+'</div>'
        + '</div>';
    }).join('');
  } else {
    sparkEl.innerHTML = '<div class="empty" style="padding:16px">No activity data yet</div>';
  }

  // Categories horizontal bars
  var cats = t.cats || {};
  var catKeys = Object.keys(cats).sort(function(a,b){return cats[b]-cats[a];}).slice(0,12);
  var maxCat = catKeys.length ? cats[catKeys[0]] : 1;
  var catsEl = document.getElementById('cats-list');
  if (catKeys.length) {
    catsEl.innerHTML = catKeys.map(function(c) {
      var pct = Math.round((cats[c]/maxCat)*100);
      return '<div class="hbar-row">'
        + '<div class="hbar-label">'+esc(c)+'</div>'
        + '<div class="hbar-bg"><div class="hbar-fill" style="width:'+pct+'%"></div></div>'
        + '<div class="hbar-val">'+cats[c]+'</div>'
        + '</div>';
    }).join('');
  } else {
    catsEl.innerHTML = '<div class="empty">No queries yet</div>';
  }

  // Recent queries
  var queries = (data.recentQueries||[]).slice(0,60);
  var ql = document.getElementById('query-list');
  if (queries.length) {
    ql.innerHTML = queries.map(function(q) {
      var ts = q.ts ? new Date(q.ts).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';
      return '<div class="q-item">'
        + '<div class="q-text">'+esc(q.q)+(q.img?' 📷':'')+'</div>'
        + '<div class="q-meta"><span class="pill">'+esc(q.cat||'?')+'</span><br>'+ts+'</div>'
        + '</div>';
    }).join('');
  } else {
    ql.innerHTML = '<div class="empty">No queries yet</div>';
  }

  document.getElementById('nav-sub').textContent =
    'Updated ' + new Date(data.generated||Date.now()).toLocaleTimeString();
}
</script>
</body>
</html>
