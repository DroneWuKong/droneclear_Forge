{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Intel — Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'base.css' %}">
<link rel="stylesheet" href="{% static 'layout.css' %}?v=4">
<link rel="stylesheet" href="{% static 'components.css' %}">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('dc-theme')||'dark');})()</script>
<style>
/* ── Layout ── */
.feed-header{padding:16px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.feed-title{font-family:'JetBrains Mono',monospace;font-size:1.05rem;color:var(--text-main)}
.feed-sub{font-size:.68rem;color:var(--text-muted);margin-top:2px}

/* ── Controls bar — single row on mobile ── */
.controls{padding:10px 16px;display:flex;flex-direction:column;gap:6px;border-bottom:1px solid var(--border-color)}
.controls-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border-color);background:transparent;
  color:var(--text-muted);font-size:.72rem;cursor:pointer;font-family:'JetBrains Mono',monospace;
  transition:all .15s;white-space:nowrap;line-height:1.4}
.chip:hover{border-color:var(--text-muted);color:var(--text-main)}
.chip.active{font-weight:700}
.chip[data-cat="all"].active{color:var(--accent-teal);border-color:var(--accent-teal);background:rgba(78,205,196,.1)}
.chip[data-cat="defense"].active{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,.1)}
.chip[data-cat="financial"].active{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.1)}
.chip[data-cat="commercial"].active{color:var(--accent-teal);border-color:var(--accent-teal);background:rgba(78,205,196,.1)}
.chip[data-src].active{color:var(--accent-teal);border-color:var(--accent-teal);background:rgba(78,205,196,.08)}
#q{flex:1;min-width:0;padding:5px 10px;border-radius:20px;border:1px solid var(--border-color);
  background:var(--bg-panel);color:var(--text-main);font-size:.78rem;font-family:'JetBrains Mono',monospace}
#q:focus{outline:none;border-color:var(--accent-teal)}

/* ── Scroll + lobby controls ── */
.feed-controls{display:flex;gap:8px;align-items:center}
.lobby-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border-color);background:transparent;
  color:var(--text-muted);font-size:.72rem;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;white-space:nowrap}
.lobby-btn:hover{border-color:var(--accent-teal);color:var(--accent-teal)}
.scroll-label{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text-muted);
  cursor:pointer;font-family:'JetBrains Mono',monospace;user-select:none;white-space:nowrap}
.scroll-label input{accent-color:var(--accent-teal);width:12px;height:12px;cursor:pointer}

/* ── Stats bar ── */
.statsbar{padding:5px 16px;font-size:.68rem;color:var(--text-muted);
  display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--border-color);line-height:1.6}
.statsbar b{color:var(--accent-teal)}

/* ── Cards ── */
.feed-main{padding:12px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:1fr;gap:14px}
@media(min-width:700px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1400px){.grid{grid-template-columns:repeat(3,1fr)}}
.card{background:var(--bg-panel);border:1px solid var(--border-color);border-radius:var(--radius-md);
border-left:3px solid transparent;
  padding:12px;text-decoration:none;display:block;transition:all .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.4)}
.card[data-cat="defense"]{border-left-color:#ef4444}
.card[data-cat="financial"]{border-left-color:#f59e0b}
.card[data-cat="commercial"]{border-left-color:#4ECDC4}
.card[data-cat="defense"]:hover{border-color:#ef4444;border-left-color:#ef4444}
.card[data-cat="financial"]:hover{border-color:#f59e0b;border-left-color:#f59e0b}
.card[data-cat="commercial"]:hover{border-color:#4ECDC4;border-left-color:#4ECDC4}
.cat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;flex-shrink:0}
.badge{display:inline-block;font-size:.68rem;font-family:'JetBrains Mono',monospace;padding:3px 8px;
  border-radius:3px;margin-bottom:5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.s-defensescoop{background:rgba(148,163,184,.12);color:#94a3b8}
.s-defensenews{background:rgba(148,163,184,.12);color:#94a3b8}
.s-breakingdefense{background:rgba(148,163,184,.12);color:#94a3b8}
.s-twz{background:rgba(148,163,184,.12);color:#94a3b8}
.s-suasnews,.s-dronelife,.s-militarnyi,.s-unmannedairspace,.s-defenceindeu{background:rgba(78,205,196,.12);color:#4ECDC4}
.card h3{font-size:1rem;color:var(--text-main);line-height:1.45;margin-bottom:8px;font-weight:700;letter-spacing:-.01em}
.card .sum{font-size:.85rem;color:var(--text-muted);line-height:1.6;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tags{margin-top:5px;display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:.66rem;padding:2px 7px;border-radius:3px;background:rgba(78,205,196,.08);
  color:var(--accent-teal);border:1px solid rgba(78,205,196,.2)}
.meta{margin-top:10px;display:flex;gap:8px;font-size:.75rem;color:var(--text-muted);
  align-items:center;border-top:1px solid var(--border-color);padding-top:6px}
.meta a{color:var(--accent-teal);text-decoration:none;margin-left:auto;font-weight:700;font-size:.8rem;letter-spacing:.02em}

/* ── Ticker ── */
.ticker{overflow:hidden;height:28px;border-bottom:1px solid var(--border-color);display:none;
  background:var(--bg-main);position:sticky;top:0;z-index:10}
body.lobby-mode .ticker{display:block}
.ticker-inner{display:inline-flex;white-space:nowrap;will-change:transform}
.tick-item{padding:0 20px;font-size:.68rem;color:var(--text-muted);line-height:28px;
  border-right:1px solid var(--border-color);font-family:'JetBrains Mono',monospace}
.tick-item b{color:var(--accent-teal)}

/* ── Lobby mode ── */
body.lobby-mode .controls{display:none}
body.lobby-mode .statsbar{display:none}
body.lobby-mode .feed-main{padding:10px 12px}
body.lobby-mode .grid{gap:8px}
.lobby-exit{display:none;position:fixed;top:8px;right:12px;z-index:100;
  padding:5px 12px;border-radius:4px;border:1px solid var(--accent-teal);
  background:rgba(0,0,0,.85);color:var(--accent-teal);font-size:.72rem;
  cursor:pointer;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(4px)}
body.lobby-mode .lobby-exit{display:block}
body.lobby-mode .lobby-btn{display:none}
.msg{text-align:center;padding:48px 20px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div style="flex:1;overflow-y:auto">

<div class="ticker"><div class="ticker-inner" id="tickerInner"></div></div>
<button class="lobby-exit" onclick="toggleLobby(this)">✕ Exit Lobby</button>

<div class="feed-header">
  <div>
    <div class="feed-title">// INTEL FEED</div>
    <div class="feed-sub">Curated &amp; indexed · live pipeline</div>
  </div>
  <div class="feed-controls">
    <label class="scroll-label">
      <input type="checkbox" id="autoScrollToggle">
      scroll
    </label>
    <button class="lobby-btn" onclick="toggleLobby(this)">⊞ Lobby</button>
  </div>
</div>

<div class="controls">
  <div class="controls-row">
    <button class="chip active" data-cat="all">All</button>
    <button class="chip" data-cat="defense">⬥ Defense</button>
    <button class="chip" data-cat="financial">⬥ Financial</button>
    <button class="chip" data-cat="commercial">⬥ Commercial</button>
  </div>
  <div class="controls-row">
    <button class="chip active" data-src="all">All</button>
    <button class="chip" data-src="defensescoop">DefenseScoop</button>
    <button class="chip" data-src="defensenews">Def. News</button>
    <button class="chip" data-src="breakingdefense">Breaking Def.</button>
    <button class="chip" data-src="twz">TWZ</button>
    <input id="q" type="text" placeholder="Search…" />
  </div>
</div>
<div class="statsbar" id="stats"><span>Loading…</span></div>
<div class="feed-main"><div class="grid" id="grid"><div class="msg">Loading…</div></div></div>

</div>

<script>
const SRC_LABELS={defensescoop:'DefenseScoop',defensenews:'Defense News',breakingdefense:'Breaking Defense',twz:'TWZ'};
const SRC_CLS={defensescoop:'s-defensescoop',defensenews:'s-defensenews',breakingdefense:'s-breakingdefense',twz:'s-twz'};
const CAT_COLORS={defense:'#ef4444',financial:'#f59e0b',commercial:'#4ECDC4'};
const DEFENSE_KW=['pentagon','dod ','department of defense','military','army','navy','air force','marine corps','replicator','counter-uas','c-uas','jiatf','dawg','diu','ndaa','blue uas','combat','warfare','warfighter','deployed','tactical','darpa','socom','centcom','indopacom','program of record','weapon system','munition','loitering'];
const FINANCE_KW=['billion','million','contract worth','contract valued','contract award','awarded a','funding','investment','raise','series a','series b','ipo','acquisition','merger','valuation','budget request','procurement','rfp ','fiscal year','fy2','fy3','defense budget','sbir','sttr','ota ','other transaction'];
function categorize(a){const t=((a.title||'')+(a.summary||'')+(a.body_text||'')).toLowerCase();const d=DEFENSE_KW.filter(k=>t.includes(k)).length;const f=FINANCE_KW.filter(k=>t.includes(k)).length;if(d>=3)return'defense';if(f>=2&&f>=d*.6)return'financial';if(d>=2)return'defense';return'commercial';}
let all=[],curCat='all',curSrc='all',curQ='',lobbyTimer=null;

function card(a){
  const cat=categorize(a);
  const tags=[...(a.platforms||[]).slice(0,2),...(a.programs||[]).slice(0,2)];
  const col=CAT_COLORS[cat]||'#4ECDC4';
  return `<a class="card" data-cat="${cat}" href="${a.url||'#'}" target="_blank" rel="noopener">
    <div class="card-meta">
      <span class="cat-dot" style="background:${col}"></span>
      <span class="badge ${SRC_CLS[a.site]||''}">${SRC_LABELS[a.site]||a.site}</span>
    </div>
    <h3>${a.title||'Untitled'}</h3>
    <div class="sum">${a.summary||(a.body_text||'').slice(0,220)||'—'}</div>
    ${tags.length?'<div class="tags">'+tags.map(t=>`<span class="tag">${t}</span>`).join('')+'</div>':''}
    <div class="card-footer">
      <span class="date">${(a.pub_date||'').slice(0,10)}</span>
      <a class="read-link" href="${a.url||'#'}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Read →</a>
    </div></a>`;
}

function render(){
  let f=all;
  if(curCat!=='all') f=f.filter(a=>categorize(a)===curCat);
  if(curSrc!=='all') f=f.filter(a=>a.site===curSrc);
  if(curQ){const q=curQ.toLowerCase();f=f.filter(a=>(a.title||'').toLowerCase().includes(q)||(a.summary||'').toLowerCase().includes(q)||(a.platforms||[]).some(p=>p.toLowerCase().includes(q)));}
  f.sort((a,b)=>(b.pub_date||'').localeCompare(a.pub_date||''));

  // Stats
  const cats={defense:0,financial:0,commercial:0};
  all.forEach(a=>cats[categorize(a)]++);
  const cnts={};
  all.forEach(a=>cnts[a.site]=(cnts[a.site]||0)+1);
  document.getElementById('stats').innerHTML=
    `<span>Showing <b>${f.length}</b> of <b>${all.length}</b></span>`+
    `<span>⬥ <span style="color:#ef4444">${cats.defense}</span> defense</span>`+
    `<span>⬥ <span style="color:#f59e0b">${cats.financial}</span> financial</span>`+
    `<span>⬥ <span style="color:#4ECDC4">${cats.commercial}</span> commercial</span>`+
    Object.entries(SRC_LABELS).map(([k,v])=>`<span>${v}: <b>${cnts[k]||0}</b></span>`).join('');

  document.getElementById('grid').innerHTML=f.length?f.map(card).join(''):'<div class="msg">No articles match.</div>';
  document.getElementById('tickerInner').innerHTML=(f.slice(0,20).map(a=>`<span class="tick-item"><b>${SRC_LABELS[a.site]||a.site}</b> — ${a.title}</span>`).join('')).repeat(2);
}

// Category tabs
document.querySelectorAll('.chip[data-cat]').forEach(b=>b.addEventListener('click',e=>{
  curCat=e.currentTarget.dataset.cat;
  curSrc='all';
  document.querySelectorAll('.chip[data-cat]').forEach(x=>x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.querySelectorAll('.chip[data-src]').forEach(x=>x.classList.remove('active'));
  document.querySelector('.chip[data-src="all"]')?.classList.add('active');
  render();
}));

// Source filters
document.querySelectorAll('.chip[data-src]').forEach(b=>b.addEventListener('click',e=>{
  curSrc=e.currentTarget.dataset.src;
  document.querySelectorAll('.chip[data-src]').forEach(x=>x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  render();
}));

document.getElementById('q').addEventListener('input',e=>{curQ=e.target.value;render();});

// Ticker driven by JS — speed tied to page scroll position for visual sync
let tickerPos=0, tickerWidth=0, tickerRaf=null;
function animateTicker(){
  const inner=document.getElementById('tickerInner');
  if(!inner) return;
  if(!tickerWidth) tickerWidth=inner.scrollWidth/2||1;
  tickerPos+=0.4; // px per frame — slow crawl
  if(tickerPos>=tickerWidth) tickerPos=0;
  inner.style.transform=`translateX(-${tickerPos}px)`;
  tickerRaf=requestAnimationFrame(animateTicker);
}

// Gentle auto-scroll — pauses when user touches/scrolls, resumes after 2s
let userScrolling=false, scrollResumeTimer=null, scrollEl=null;
function startAutoScroll(){
  function tick(){
    if(!document.body.classList.contains('lobby-mode')) return;
    const cb=document.getElementById('autoScrollToggle');
    if(!userScrolling && cb && cb.checked){
      const el=document.documentElement;
      const atBottom=(el.scrollTop+el.clientHeight)>=el.scrollHeight-20;
      if(atBottom) window.scrollTo({top:0});
      else window.scrollBy({top:0.8});
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function pauseAutoScroll(){
  userScrolling=true;
  clearTimeout(scrollResumeTimer);
  scrollResumeTimer=setTimeout(()=>{userScrolling=false;},2500);
}
window.addEventListener('wheel',pauseAutoScroll,{passive:true});
window.addEventListener('touchstart',pauseAutoScroll,{passive:true});
window.addEventListener('touchmove',pauseAutoScroll,{passive:true});
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','PageUp','PageDown','Home','End',' '].includes(e.key)) pauseAutoScroll();
});

function toggleLobby(btn){
  const on=document.body.classList.toggle('lobby-mode');
  if(on){
    animateTicker();
    startAutoScroll();
  } else {
    cancelAnimationFrame(tickerRaf);
    tickerRaf=null;
    tickerPos=0;
    const inner=document.getElementById('tickerInner');
    if(inner) inner.style.transform='translateX(0)';
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// Check URL params for pre-selected category or lobby mode
const params=new URLSearchParams(location.search);
const initCat=params.get('cat');
if(initCat&&['defense','financial','commercial'].includes(initCat)){
  curCat=initCat;
  document.querySelectorAll('.chip[data-cat]').forEach(b=>{b.classList.toggle('active',b.dataset.cat===initCat);});
}
if(params.get('lobby')==='1') setTimeout(()=>toggleLobby(document.querySelector('.lobby-btn')),500);

// Standalone auto-scroll — works outside lobby mode too
(function(){
  let rafId=null;
  function scrollLoop(){
    const cb=document.getElementById('autoScrollToggle');
    if(cb && cb.checked && !userScrolling){
      const el=document.documentElement;
      const atBottom=(el.scrollTop+el.clientHeight)>=el.scrollHeight-20;
      if(atBottom) window.scrollTo({top:0});
      else window.scrollBy({top:0.8});
    }
    rafId=requestAnimationFrame(scrollLoop);
  }
  const cb=document.getElementById('autoScrollToggle');
  if(cb){
    cb.addEventListener('change',e=>{
      if(e.target.checked){
        userScrolling=false;
        scrollLoop();
      } else {
        cancelAnimationFrame(rafId);
      }
    });
  }
})();

fetch('intel_articles.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(d=>{all=d;render();})
  .catch(e=>{document.getElementById('grid').innerHTML=`<div class="msg">Error loading intel data: ${e.message}</div>`;});
</script>
</body>
</html>
