{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Intel — Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'base.css' %}">
<link rel="stylesheet" href="{% static 'layout.css' %}?v=4">
<link rel="stylesheet" href="{% static 'components.css' %}">
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('dc-theme')||'dark');})()</script>
<style>
.feed-header{padding:20px 28px 0;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap}
.feed-title{font-family:'JetBrains Mono',monospace;font-size:1.15rem;color:var(--text-main)}
.feed-sub{font-size:.73rem;color:var(--text-muted);margin-top:3px}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 28px 0}
.cat-tab{padding:6px 14px;border-radius:4px;border:1px solid var(--border-color);background:transparent;
  color:var(--text-muted);font-size:.78rem;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.cat-tab:hover{color:var(--text-main);border-color:var(--text-muted)}
.cat-tab.active{font-weight:700}
.cat-tab[data-cat="all"].active{color:var(--accent-teal);border-color:var(--accent-teal);background:rgba(78,205,196,.1)}
.cat-tab[data-cat="defense"].active{color:#ef4444;border-color:#ef4444;background:rgba(239,68,68,.1)}
.cat-tab[data-cat="financial"].active{color:#f59e0b;border-color:#f59e0b;background:rgba(245,158,11,.1)}
.cat-tab[data-cat="commercial"].active{color:var(--accent-teal);border-color:var(--accent-teal);background:rgba(78,205,196,.1)}
.toolbar{padding:10px 28px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--border-color)}
.sb{padding:4px 12px;border-radius:4px;border:1px solid var(--border-color);background:transparent;
  color:var(--text-muted);font-size:.75rem;cursor:pointer;transition:all .15s;font-family:'JetBrains Mono',monospace}
.sb:hover,.sb.active{border-color:var(--accent-teal);color:var(--accent-teal);background:rgba(78,205,196,.08)}
#q{margin-left:auto;padding:5px 12px;border-radius:4px;border:1px solid var(--border-color);
  background:var(--bg-panel);color:var(--text-main);font-size:.82rem;width:220px;font-family:'JetBrains Mono',monospace}
#q:focus{outline:none;border-color:var(--accent-teal)}
.lobby-btn{padding:4px 12px;border-radius:4px;border:1px solid var(--border-color);background:transparent;
  color:var(--text-muted);font-size:.75rem;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.lobby-btn:hover{border-color:var(--accent-teal);color:var(--accent-teal)}
.statsbar{padding:6px 28px;font-size:.71rem;color:var(--text-muted);display:flex;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--border-color)}
.statsbar b{color:var(--accent-teal)}
.feed-main{padding:20px 28px;max-width:1600px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.card{background:var(--bg-panel);border:1px solid var(--border-color);border-radius:var(--radius-md);
  padding:14px;text-decoration:none;display:block;transition:all .15s;position:relative}
.card:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card[data-cat="defense"]:hover{border-color:#ef4444}
.card[data-cat="financial"]:hover{border-color:#f59e0b}
.card[data-cat="commercial"]:hover{border-color:var(--accent-teal)}
.cat-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle}
.badge{display:inline-block;font-size:.6rem;font-family:'JetBrains Mono',monospace;padding:2px 6px;
  border-radius:3px;margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.s-defensescoop{background:rgba(59,130,246,.15);color:#60a5fa}
.s-defensenews{background:rgba(168,85,247,.15);color:#c084fc}
.s-breakingdefense{background:rgba(249,115,22,.15);color:#fb923c}
.s-twz{background:rgba(34,197,94,.15);color:#4ade80}
.card h3{font-size:.87rem;color:var(--text-main);line-height:1.38;margin-bottom:6px;font-weight:600}
.card .sum{font-size:.75rem;color:var(--text-muted);line-height:1.55;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:3px}
.tag{font-size:.6rem;padding:1px 5px;border-radius:3px;background:rgba(78,205,196,.08);
  color:var(--accent-teal);border:1px solid rgba(78,205,196,.2)}
.meta{margin-top:8px;display:flex;gap:8px;font-size:.67rem;color:var(--text-muted);
  align-items:center;border-top:1px solid var(--border-color);padding-top:7px}
.meta a{color:var(--accent-teal);text-decoration:none;margin-left:auto;font-weight:600}
.ticker{overflow:hidden;height:30px;border-bottom:1px solid var(--border-color);display:none;background:var(--bg-main);position:sticky;top:0;z-index:10}
body.lobby-mode .ticker{display:block}
.ticker-inner{display:inline-flex;white-space:nowrap;will-change:transform}
.tick-item{padding:0 24px;font-size:.72rem;color:var(--text-muted);line-height:30px;
  border-right:1px solid var(--border-color);font-family:'JetBrains Mono',monospace}
.tick-item b{color:var(--accent-teal)}
body.lobby-mode .toolbar,.lobby-mode .statsbar{display:none}
body.lobby-mode .feed-main{padding:12px 16px}
body.lobby-mode .cat-tabs{padding:10px 16px 0}
body.lobby-mode .grid{gap:10px}
/* Lobby exit button stays visible, fixed top-right */
.lobby-exit{display:none;position:fixed;top:10px;right:14px;z-index:100;
  padding:6px 14px;border-radius:4px;border:1px solid var(--accent-teal);
  background:rgba(0,0,0,.8);color:var(--accent-teal);font-size:.75rem;
  cursor:pointer;font-family:'JetBrains Mono',monospace;backdrop-filter:blur(4px)}
body.lobby-mode .lobby-exit{display:block}
body.lobby-mode .lobby-btn{display:none}
.msg{text-align:center;padding:60px 20px;color:var(--text-muted);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>
<div style="flex:1;overflow-y:auto">

<div class="feed-header">
  <div>
    <div class="feed-title">// INTEL FEED</div>
    <div class="feed-sub">Defense news — curated &amp; indexed · 4 sources · live pipeline</div>
  </div>
  <button class="lobby-btn" style="margin-left:auto;margin-top:4px" onclick="toggleLobby(this)">⊞ Lobby</button>
</div>

<div class="ticker"><div class="ticker-inner" id="tickerInner"></div></div>
<button class="lobby-exit" onclick="toggleLobby(this)">✕ Exit Lobby</button>

<div class="cat-tabs">
  <button class="cat-tab active" data-cat="all">All</button>
  <button class="cat-tab" data-cat="defense">⬥ Defense</button>
  <button class="cat-tab" data-cat="financial">⬥ Financial</button>
  <button class="cat-tab" data-cat="commercial">⬥ Commercial</button>
</div>

<div class="toolbar">
  <button class="sb active" data-src="all">All Sources</button>
  <button class="sb" data-src="defensescoop">DefenseScoop</button>
  <button class="sb" data-src="defensenews">Defense News</button>
  <button class="sb" data-src="breakingdefense">Breaking Defense</button>
  <button class="sb" data-src="twz">TWZ</button>
  <input id="q" type="text" placeholder="Search articles…" />
</div>
<div class="statsbar" id="stats"><span>Loading…</span></div>
<div class="feed-main"><div class="grid" id="grid"><div class="msg">Loading…</div></div></div>

</div>

<script>
const SRC_LABELS={defensescoop:'DefenseScoop',defensenews:'Defense News',breakingdefense:'Breaking Defense',twz:'TWZ'};
const SRC_CLS={defensescoop:'s-defensescoop',defensenews:'s-defensenews',breakingdefense:'s-breakingdefense',twz:'s-twz'};
const CAT_COLORS={defense:'#ef4444',financial:'#f59e0b',commercial:'#4ECDC4'};
const DEFENSE_KW=['pentagon','dod ','department of defense','military','army','navy','air force','marine corps','replicator','counter-uas','c-uas','jiatf','dawg','diu','ndaa','blue uas','combat','warfare','warfighter','deployed','tactical','darpa','socom','centcom','indopacom','program of record','weapon system','munition','loitering'];
const FINANCE_KW=['billion','million','contract worth','contract valued','contract award','awarded a','funding','investment','raise','series a','series b','ipo','acquisition','merger','valuation','budget request','procurement','rfp ','fiscal year','fy2','fy3','defense budget','sbir','sttr','ota ','other transaction'];
function categorize(a){const t=((a.title||'')+(a.summary||'')+(a.body_text||'')).toLowerCase();const d=DEFENSE_KW.filter(k=>t.includes(k)).length;const f=FINANCE_KW.filter(k=>t.includes(k)).length;if(f>=2&&f>=d*.6)return'financial';if(d>=2)return'defense';return'commercial';}
let all=[],curCat='all',curSrc='all',curQ='',lobbyTimer=null;

function card(a){
  const cat=categorize(a);
  const tags=[...(a.platforms||[]).slice(0,2),...(a.programs||[]).slice(0,2)];
  const col=CAT_COLORS[cat]||'#4ECDC4';
  return `<a class="card" data-cat="${cat}" href="${a.url||'#'}" target="_blank" rel="noopener">
    <span class="badge ${SRC_CLS[a.site]||''}">${SRC_LABELS[a.site]||a.site}</span>
    <span class="cat-dot" style="background:${col}"></span>
    <h3>${a.title||'Untitled'}</h3>
    <div class="sum">${a.summary||(a.body_text||'').slice(0,200)||'—'}</div>
    ${tags.length?'<div class="tags">'+tags.map(t=>`<span class="tag">${t}</span>`).join('')+'</div>':''}
    <div class="meta">
      <span>${(a.pub_date||'').slice(0,10)}</span>
      ${a.author?`<span>${a.author}</span>`:''}
      <a href="${a.url||'#'}" target="_blank">Read →</a>
    </div></a>`;
}

function render(){
  let f=all;
  if(curCat!=='all') f=f.filter(a=>categorize(a)===curCat);
  if(curSrc!=='all') f=f.filter(a=>a.site===curSrc);
  if(curQ){const q=curQ.toLowerCase();f=f.filter(a=>(a.title||'').toLowerCase().includes(q)||(a.summary||'').toLowerCase().includes(q)||(a.platforms||[]).some(p=>p.toLowerCase().includes(q)));}
  f.sort((a,b)=>(b.pub_date||'').localeCompare(a.pub_date||''));

  // Stats
  const cats={defense:0,financial:0,commercial:0};
  all.forEach(a=>cats[categorize(a)]++);
  const cnts={};
  all.forEach(a=>cnts[a.site]=(cnts[a.site]||0)+1);
  document.getElementById('stats').innerHTML=
    `<span>Showing <b>${f.length}</b> of <b>${all.length}</b></span>`+
    `<span>⬥ <span style="color:#ef4444">${cats.defense}</span> defense</span>`+
    `<span>⬥ <span style="color:#f59e0b">${cats.financial}</span> financial</span>`+
    `<span>⬥ <span style="color:#4ECDC4">${cats.commercial}</span> commercial</span>`+
    Object.entries(SRC_LABELS).map(([k,v])=>`<span>${v}: <b>${cnts[k]||0}</b></span>`).join('');

  document.getElementById('grid').innerHTML=f.length?f.map(card).join(''):'<div class="msg">No articles match.</div>';
  document.getElementById('tickerInner').innerHTML=(f.slice(0,20).map(a=>`<span class="tick-item"><b>${SRC_LABELS[a.site]||a.site}</b> — ${a.title}</span>`).join('')).repeat(2);
}

// Category tabs
document.querySelectorAll('.cat-tab').forEach(b=>b.addEventListener('click',e=>{
  curCat=e.currentTarget.dataset.cat;
  document.querySelectorAll('.cat-tab').forEach(x=>x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  render();
}));

// Source filters
document.querySelectorAll('.sb').forEach(b=>b.addEventListener('click',e=>{
  curSrc=e.currentTarget.dataset.src;
  document.querySelectorAll('.sb').forEach(x=>x.classList.remove('active'));
  e.currentTarget.classList.add('active');
  render();
}));

document.getElementById('q').addEventListener('input',e=>{curQ=e.target.value;render();});

// Ticker driven by JS — speed tied to page scroll position for visual sync
let tickerPos=0, tickerWidth=0, tickerRaf=null;
function animateTicker(){
  const inner=document.getElementById('tickerInner');
  if(!inner) return;
  if(!tickerWidth) tickerWidth=inner.scrollWidth/2||1;
  tickerPos+=0.4; // px per frame — slow crawl
  if(tickerPos>=tickerWidth) tickerPos=0;
  inner.style.transform=`translateX(-${tickerPos}px)`;
  tickerRaf=requestAnimationFrame(animateTicker);
}

// Gentle auto-scroll — pauses when user touches/scrolls, resumes after 2s
let userScrolling=false, scrollResumeTimer=null, scrollEl=null;
function startAutoScroll(){
  scrollEl=document.querySelector('[style*="overflow-y"]')||document.scrollingElement||window;
  function tick(){
    if(!document.body.classList.contains('lobby-mode')) return;
    if(!userScrolling){
      const el=document.documentElement;
      const atBottom=(el.scrollTop+el.clientHeight)>=el.scrollHeight-20;
      if(atBottom) window.scrollTo({top:0});
      else window.scrollBy({top:0.8});
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
function pauseAutoScroll(){
  userScrolling=true;
  clearTimeout(scrollResumeTimer);
  scrollResumeTimer=setTimeout(()=>{userScrolling=false;},2500);
}
window.addEventListener('wheel',pauseAutoScroll,{passive:true});
window.addEventListener('touchstart',pauseAutoScroll,{passive:true});
window.addEventListener('touchmove',pauseAutoScroll,{passive:true});
window.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','PageUp','PageDown','Home','End',' '].includes(e.key)) pauseAutoScroll();
});

function toggleLobby(btn){
  const on=document.body.classList.toggle('lobby-mode');
  if(on){
    animateTicker();
    startAutoScroll();
  } else {
    cancelAnimationFrame(tickerRaf);
    tickerRaf=null;
    tickerPos=0;
    const inner=document.getElementById('tickerInner');
    if(inner) inner.style.transform='translateX(0)';
    window.scrollTo({top:0,behavior:'smooth'});
  }
}

// Check URL params for pre-selected category or lobby mode
const params=new URLSearchParams(location.search);
const initCat=params.get('cat');
if(initCat&&['defense','financial','commercial'].includes(initCat)){
  curCat=initCat;
  document.querySelectorAll('.cat-tab').forEach(b=>{b.classList.toggle('active',b.dataset.cat===initCat);});
}
if(params.get('lobby')==='1') setTimeout(()=>toggleLobby(document.querySelector('.lobby-btn')),500);

fetch('intel_articles.json').then(r=>{if(!r.ok)throw new Error(r.status);return r.json();})
  .then(d=>{all=d;render();})
  .catch(e=>{document.getElementById('grid').innerHTML=`<div class="msg">Error loading intel data: ${e.message}</div>`;});
</script>
</body>
</html>
