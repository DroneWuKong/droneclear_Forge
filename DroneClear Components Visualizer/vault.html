<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forge</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<link rel="stylesheet" href="">
<link rel="stylesheet" href="{% static 'base.css' %}">
    <link rel="stylesheet" href="{% static 'layout.css' %}?v=4">
    <link rel="stylesheet" href="{% static 'components.css' %}">
<link rel="stylesheet" href="">
<style>
body{background:#0a0a0a!important}
.gate{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;font-family:'VT323',monospace;color:#22d3ee;padding:24px}
.gate.hidden{display:none}
.skull{font-size:96px;margin-bottom:16px;user-select:none}
.msg{font-size:22px;margin-bottom:32px}
.row{display:flex;gap:8px}
.pwd{padding:10px 16px;font-size:18px;font-family:'VT323',monospace;background:#111;border:1px solid #333;color:#22d3ee;border-radius:4px;text-align:center;letter-spacing:2px;width:300px}
.pwd:focus{outline:none;border-color:#22d3ee}
.go{padding:10px 20px;background:#22d3ee;color:#0a0a0a;border:none;border-radius:4px;font-size:18px;font-family:'VT323',monospace;cursor:pointer;font-weight:700}
.err{color:#ef4444;font-size:16px;margin-top:12px;min-height:20px}
.vault{display:none;max-width:1100px;margin:0 auto;padding:32px 24px;width:100%;font-family:'VT323',monospace;color:#22d3ee}
.vault.open{display:block}
.vault-hdr h1{font-size:18px;letter-spacing:2px;margin-bottom:4px}
.vault-hdr p{font-size:13px;color:rgba(34,211,238,.4)}
.vault-note{font-size:12px;color:rgba(34,211,238,.3);padding:10px;border:1px solid rgba(34,211,238,.06);border-radius:3px;margin:16px 0}
.vault-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.vs{background:rgba(34,211,238,.03);border:1px solid rgba(34,211,238,.1);border-radius:4px;padding:10px;text-align:center}
.vs b{font-size:22px;display:block;text-shadow:0 0 8px rgba(34,211,238,.3)}
.vs span{font-size:10px;color:rgba(34,211,238,.4);text-transform:uppercase;letter-spacing:.5px}
.vault-tabs{display:flex;gap:2px;margin-bottom:10px}
.vt{padding:6px 14px;font-size:14px;color:rgba(34,211,238,.4);background:rgba(34,211,238,.03);border:1px solid rgba(34,211,238,.1);border-radius:3px 3px 0 0;cursor:pointer;border-bottom:none;letter-spacing:1px}
.vt:hover{color:rgba(34,211,238,.7)}
.vt.on{color:#22d3ee;border-bottom:2px solid #22d3ee}
.vault-search{width:100%;padding:8px 12px;font-size:14px;background:rgba(0,0,0,.5);border:1px solid rgba(34,211,238,.15);border-radius:3px;color:#22d3ee;font-family:'VT323',monospace;margin-bottom:10px}
.vault-search:focus{outline:none;border-color:rgba(34,211,238,.4)}
.vault-search::placeholder{color:rgba(34,211,238,.2)}
.vscroll{max-height:55vh;overflow-y:auto;border:1px solid rgba(34,211,238,.1);border-radius:3px}
.vscroll::-webkit-scrollbar{width:4px}
.vscroll::-webkit-scrollbar-thumb{background:rgba(34,211,238,.2)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:5px 8px;text-align:left;font-size:12px;color:rgba(34,211,238,.5);background:rgba(0,0,0,.4);border-bottom:1px solid rgba(34,211,238,.15);position:sticky;top:0;z-index:1;letter-spacing:1px}
td{padding:4px 8px;border-bottom:1px solid rgba(34,211,238,.04);color:rgba(34,211,238,.5)}
tr:hover td{background:rgba(34,211,238,.03);color:#22d3ee}
.p{font-size:11px;color:rgba(34,211,238,.3)}
.n{color:#22d3ee}
.m{color:rgba(34,211,238,.6)}
.pr{text-align:right}
.b{display:inline-block;padding:1px 6px;border-radius:2px;font-size:11px;letter-spacing:1px}
.bm{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.2)}
.bc{background:rgba(234,179,8,.1);color:#eab308;border:1px solid rgba(234,179,8,.2)}
.bu{background:rgba(34,211,238,.1);color:#22d3ee;border:1px solid rgba(34,211,238,.2)}
</style>
<style>html,body{background:#0c0c0a!important;color:#f5f0e8}</style>
</head>
<body>
<header style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 16px;border-bottom:1px solid #2e2e26;background:#1c1c17;position:sticky;top:0;z-index:100;flex-shrink:0;">
  <a href="/" style="font:800 18px 'JetBrains Mono',monospace;color:#ff3b5c;letter-spacing:-0.03em;text-decoration:none;flex-shrink:0;">Forge</a>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:nowrap;"><a href="/intel/" class="tp-pill">Intel</a><a href="/patterns/" class="tp-pill">Patterns</a><a href="/tools-home/" class="tp-pill">Tools</a><a href="/wingman/" class="tp-pill">Wingman</a></div>
</header>
<style>.tp-pill{font:500 10px 'DM Sans',system-ui,sans-serif;color:#6b6358;padding:4px 9px;border:1px solid #2e2e26;border-radius:20px;text-decoration:none;white-space:nowrap;transition:all .15s}.tp-pill:hover{border-color:#3e3e34;color:#b8b0a0}</style>
<div class="gate" id="gate">
<div class="skull">&#9760;</div>
<div class="msg">WANT TO PLAY A GAME?</div>
<div class="row"><input type="password" class="pwd" id="pwd" placeholder="password" autofocus><button class="go" id="go">ENTER</button></div>
<div class="err" id="err"></div>
</div>
<main class="vault" id="vault">
<div class="vault-hdr"><h1>&#9760; VAULT</h1><p>CLASSIFIED SOURCING DATA</p></div>
<div class="vault-note">MAFIA TARGETS // COMBAT FPV // GREY-AREA PROCUREMENT // VTX.IN.UA // UAH @ 41/$</div>
<div class="vault-stats" id="stats"></div>
<div class="vault-tabs" id="tabs"></div>
<label for="vault-search" class="sr-only">Search</label>
<input type="text" class="vault-search" id="vault-search" placeholder="SEARCH...">
<div class="vscroll" id="tw"></div>
</main>
<script>
(function(){
const E=s=>{const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML};
const $=id=>document.getElementById(id);
if(sessionStorage.getItem('v')==='1'){$('gate').classList.add('hidden');$('vault').classList.add('open');load()}
function check(){const v=$('pwd').value.toLowerCase().replace(/\s+/g,'');if(v==='globalthermonuclearwar'||v==='globalthermalnuclearwar'){$('gate').classList.add('hidden');$('vault').classList.add('open');sessionStorage.setItem('v','1');load()}else{$('err').textContent='WRONG.';$('pwd').value='';$('pwd').focus()}}
$('go').addEventListener('click',check);
$('pwd').addEventListener('keydown',e=>{if(e.key==='Enter')check()});
let db,vp=[],tab='all',q='';
async function load(){if(db)return;db=await(await fetch('forge_database.json')).json();classify();stats();mkTabs();render()}
function classify(){vp=[];for(const[c,ps]of Object.entries(db.components||{})){if(!Array.isArray(ps))continue;for(const p of ps){const s=String(p.source||'').toLowerCase(),pid=String(p.pid||'').toLowerCase(),t=Array.isArray(p.tags)?p.tags.join(' ').toLowerCase():'',co=String(p.country||'').toLowerCase();let b;if(s.includes('mafia')||pid.includes('mafia'))b='mafia';else if(t.includes('combat'))b='combat';else if(co==='ukraine')b='ua';if(b)vp.push({pid:p.pid||'',name:p.name||'',mfr:p.manufacturer||'',cat:c,usd:p.approx_price||null,uah:p.approx_price_uah||null,b})}}}
function stats(){const m=vp.filter(p=>p.b==='mafia').length,c=vp.filter(p=>p.b==='combat').length,u=vp.filter(p=>p.b==='ua').length;$('stats').innerHTML=`<div class="vs"><b>${vp.length}</b><span>total</span></div><div class="vs"><b>${m}</b><span>mafia</span></div><div class="vs"><b>${c}</b><span>combat</span></div><div class="vs"><b>${u}</b><span>ukraine</span></div><div class="vs"><b>${new Set(vp.map(p=>p.mfr)).size}</b><span>mfrs</span></div>`}
function mkTabs(){$('tabs').innerHTML=[['all','ALL'],['mafia','MAFIA'],['combat','COMBAT'],['ua','UA']].map(([k,l])=>`<button class="vt${tab===k?' on':''}" data-t="${k}">${l}</button>`).join('');$('tabs').querySelectorAll('.vt').forEach(t=>t.addEventListener('click',()=>{tab=t.dataset.t;$('tabs').querySelectorAll('.vt').forEach(x=>x.classList.remove('on'));t.classList.add('on');render()}));$('vault-search').addEventListener('input',e=>{q=e.target.value.toLowerCase();render()})}
function render(){let f=vp;if(tab!=='all')f=f.filter(p=>p.b===tab);if(q)f=f.filter(p=>p.name.toLowerCase().includes(q)||p.pid.toLowerCase().includes(q)||p.mfr.toLowerCase().includes(q));const bh=b=>`<span class="b b${b[0]}">${{mafia:'MAFIA',combat:'COMBAT',ua:'UA'}[b]}</span>`;$('tw').innerHTML=`<table><thead><tr><th>PID</th><th>SRC</th><th>NAME</th><th>MFR</th><th>CAT</th><th class="pr">UAH</th><th class="pr">USD</th></tr></thead><tbody>${f.slice(0,500).map(p=>`<tr><td class="p">${E(p.pid)}</td><td>${bh(p.b)}</td><td class="n">${E(p.name)}</td><td class="m">${E(p.mfr)}</td><td>${E(p.cat.replace(/_/g,' '))}</td><td class="pr">${p.uah?'\u20B4'+Number(p.uah).toLocaleString():''}</td><td class="pr">${p.usd?'$'+Number(p.usd).toFixed(0):''}</td></tr>`).join('')}</tbody></table>`}
})();
</script>
</body>
</html>
