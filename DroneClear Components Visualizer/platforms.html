<!DOCTYPE html>

    <script>
        (function () {
            const saved = localStorage.getItem('dc-theme');
            document.documentElement.setAttribute('data-theme', saved ? saved : 'dark');
        })();
    </script>
</head>

<body>
    <div class="app-container" style="flex-direction: column;">

        <!-- Topbar -->
        <header class="topbar">
            <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <a href="/" style="text-decoration:none; display:flex; align-items:baseline; gap:8px;">
                        <span style="font-size:20px; font-weight:700; background: linear-gradient(135deg, var(--accent-red) 0%, var(--accent-darkred) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;">Forge</span>
                        <span style="font-size:9px; font-weight:500; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-faint);">Platforms</span>
                    </a>
                </div>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <!-- Filter chips -->
                    <div id="filter-bar" style="display:flex; gap:8px; flex-wrap:wrap;"></div>

                    <div style="width: 1px; height: 24px; background: var(--border-color);"></div>
                    <a href="https://nvmilldoitmyself.com" target="_blank" rel="noopener"
                        class="dark-mode-toggle" title="Drone Integration Handbook" style="text-decoration: none;">
                        <i class="ph ph-book-open-text"></i>
                    </a>
                    <button class="dark-mode-toggle" id="dark-mode-toggle" title="Toggle theme">
                        <i class="ph ph-moon" id="dark-mode-icon"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Search & Stats Bar -->
        <div class="plat-toolbar">
            <div class="plat-search-wrap">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="plat-search" placeholder="Search platforms, manufacturers, categories...">
            </div>
            <div class="plat-stats">
                <span id="plat-count">--</span> platforms
                <span class="plat-divider">·</span>
                <span id="plat-blue-count">--</span> Blue UAS
                <span class="plat-divider">·</span>
                <span id="plat-ndaa-count">--</span> NDAA compliant
            </div>
        </div>

        <!-- Platform Grid -->
        <main class="plat-grid-wrap">
            <div class="plat-grid" id="plat-grid">
                <!-- Cards injected by JS -->
            </div>
        </main>

        <!-- Detail Modal -->
        <div class="plat-modal-overlay hidden" id="plat-modal">
            <div class="plat-modal">
                <button class="plat-modal-close" id="plat-modal-close">
                    <i class="ph ph-x"></i>
                </button>
                <div id="plat-modal-content"></div>
            </div>
        </div>

    </div>

    <script src="{% static 'forge-static-adapter.js' %}"></script>
    <script src="{% static 'platforms.js' %}"></script>
    <script>
        // Theme toggle
        (function () {
            const btn = document.getElementById('dark-mode-toggle');
            const icon = document.getElementById('dark-mode-icon');
            function apply(dark) {
                document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
                if (icon) icon.className = dark ? 'ph ph-sun' : 'ph ph-moon';
            }
            const saved = localStorage.getItem('dc-theme');
            apply(saved ? saved === 'dark' : true);
            btn?.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                apply(!isDark);
                localStorage.setItem('dc-theme', !isDark ? 'dark' : 'light');
            });
        })();
    </script>
