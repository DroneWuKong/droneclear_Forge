    <script src="{% static 'forge-static-adapter.js' %}"></script>

    <script>
        // Theme toggle
        (function () {
            const btn = document.getElementById('dark-mode-toggle');
            const icon = document.getElementById('dark-mode-icon');
            function apply(dark) {
                document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
                if (icon) icon.className = dark ? 'ph ph-sun' : 'ph ph-moon';
            }
            const saved = localStorage.getItem('dc-theme');
            apply(saved ? saved === 'dark' : true);
            btn?.addEventListener('click', () => {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                apply(!isDark);
                localStorage.setItem('dc-theme', !isDark ? 'dark' : 'light');
            });
        })();
    </script>

<script>
(function(){
    var hamburger = document.getElementById('hamburgerBtn');
    var drawer = document.getElementById('navDrawer');
    var overlay = document.getElementById('navOverlay');
    var closeBtn = document.getElementById('navDrawerClose');
    function open(){drawer.classList.add('open');overlay.classList.add('open');hamburger.classList.add('open');document.body.style.overflow='hidden';}
    function close(){drawer.classList.remove('open');overlay.classList.remove('open');hamburger.classList.remove('open');document.body.style.overflow='';}
    hamburger.addEventListener('click',open);
    overlay.addEventListener('click',close);
    closeBtn.addEventListener('click',close);
    drawer.querySelectorAll('a').forEach(function(a){a.addEventListener('click',close);});
    document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
})();
</script>
