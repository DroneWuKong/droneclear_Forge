<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Builds — Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0c0a;color:#b8b0a0;font-family:'DM Sans',system-ui,sans-serif;min-height:100vh}
.gallery-header{max-width:1200px;margin:0 auto;padding:40px 20px 20px}
.gallery-header h1{font:700 28px 'JetBrains Mono',monospace;color:#f59e0b;margin-bottom:8px}
.gallery-header p{font-size:14px;color:#6b6358;max-width:600px}
.filter-bar{max-width:1200px;margin:0 auto;padding:8px 20px 16px;display:flex;gap:8px;flex-wrap:wrap}
.filter-pill{padding:6px 14px;border-radius:20px;border:1px solid #2a2a22;background:none;color:#6b6358;font:500 11px 'DM Sans',system-ui;cursor:pointer;transition:all .15s}
.filter-pill:hover{border-color:#3e3e34;color:#b8b0a0}
.filter-pill.active{border-color:#f59e0b;color:#f59e0b;background:rgba(245,158,11,.08)}
.grid{max-width:1200px;margin:0 auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.card{background:#111110;border:1px solid #2a2a22;border-radius:10px;padding:20px;transition:all .2s;display:flex;flex-direction:column}
.card:hover{border-color:#3e3e34;transform:translateY(-2px)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.card-name{font:700 15px 'DM Sans',system-ui;color:#e8e0d4}
.badge{padding:3px 8px;border-radius:4px;font:600 10px 'JetBrains Mono',monospace;text-transform:uppercase}
.badge-beginner{background:rgba(34,197,94,.12);color:#22c55e}
.badge-intermediate{background:rgba(245,158,11,.12);color:#f59e0b}
.badge-advanced{background:rgba(220,38,38,.12);color:#dc2626}
.badge-ndaa{background:rgba(59,130,246,.12);color:#3b82f6}
.card-desc{font-size:12px;color:#6b6358;line-height:1.5;margin-bottom:14px;flex:1}
.card-specs{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.spec{font:400 11px 'JetBrains Mono',monospace;color:#4a4540}
.spec b{color:#6b6358;font-weight:500}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.tag{padding:2px 8px;border-radius:3px;font:400 10px 'JetBrains Mono',monospace;background:#1a1a14;color:#4a4540}
.card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #1e1e18}
.cost{font:600 13px 'JetBrains Mono',monospace;color:#f59e0b}
.btn-build{padding:7px 16px;border-radius:6px;border:1px solid #dc2626;background:rgba(220,38,38,.08);color:#dc2626;font:600 11px 'DM Sans',system-ui;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-build:hover{background:#dc2626;color:#fff}
@media(max-width:640px){.grid{grid-template-columns:1fr}.card-specs{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="gallery-header">
  <h1>Featured Builds</h1>
  <p>Hand-curated reference builds for FPV, long-range, cinema, defense, and racing. Open any build in the Model Builder to customize or clone it.</p>
</div>

<div class="filter-bar">
  <button class="filter-pill active" data-cat="all">All</button>
  <button class="filter-pill" data-cat="freestyle">Freestyle</button>
  <button class="filter-pill" data-cat="longrange">Long Range</button>
  <button class="filter-pill" data-cat="cinelifter">Cinelifter</button>
  <button class="filter-pill" data-cat="defense">NDAA / Defense</button>
  <button class="filter-pill" data-cat="racing">Racing</button>
  <button class="filter-pill" data-cat="beginner">Beginner</button>
  <button class="filter-pill" data-cat="cinema">Cinema</button>
</div>

<div class="grid" id="builds-grid"></div>

<script>
var BUILDS = [
  {
    name: "Apex Freestyle 5\"",
    cat: "freestyle", difficulty: "intermediate",
    desc: "The quintessential 5\" freestyle quad. Punchy motors, HD digital video, and a frame that can take a beating. Perfect for park ripping and bando sessions.",
    specs: {size:"5\"",weight:"~680g",flight:"6-8 min",voltage:"6S"},
    tags: ["freestyle","digital-hd","6s","5-inch"],
    cost: "$320–$400", model: "MDL-1000"
  },
  {
    name: "Venom Racer 5\"",
    cat: "racing", difficulty: "advanced",
    desc: "Sub-250g racing build stripped to essentials. Lightweight frame, high-KV motors, and analog video for minimum latency. Built to win gates.",
    specs: {size:"5\"",weight:"~240g",flight:"4-5 min",voltage:"4S"},
    tags: ["racing","analog","4s","sub250"],
    cost: "$200–$280", model: "MDL-1001"
  },
  {
    name: "Cloudwalker HD 5\"",
    cat: "freestyle", difficulty: "intermediate",
    desc: "HD digital freestyle with DJI O3 or HDZero. Cinematic footage capability with freestyle performance. The modern all-rounder.",
    specs: {size:"5\"",weight:"~720g",flight:"5-7 min",voltage:"6S"},
    tags: ["freestyle","dji-o3","hdzero","cinematic"],
    cost: "$380–$480", model: "MDL-1002"
  },
  {
    name: "Horizon Scout 7\" LR",
    cat: "longrange", difficulty: "advanced",
    desc: "7-inch long-range explorer with GPS rescue and ELRS 900MHz. Efficient propulsion for 15+ km missions. iNav or ArduPilot firmware.",
    specs: {size:"7\"",weight:"~850g",flight:"20-30 min",voltage:"6S"},
    tags: ["long-range","gps","elrs-900","inav"],
    cost: "$400–$520", model: "MDL-1003"
  },
  {
    name: "Voyager LR6 6\" Cruiser",
    cat: "longrange", difficulty: "intermediate",
    desc: "6-inch cruiser balancing range and agility. Great for mapping, exploration, and long-distance FPV. Lightweight and efficient.",
    specs: {size:"6\"",weight:"~620g",flight:"15-20 min",voltage:"6S"},
    tags: ["long-range","mapping","efficient","6-inch"],
    cost: "$340–$420", model: "MDL-1004"
  },
  {
    name: "Atlas X 10\" CineLifter",
    cat: "cinelifter", difficulty: "advanced",
    desc: "Heavy-lift 10\" quad designed to carry full-size cinema cameras (RED Komodo, BMPCC 6K). X8 configuration for redundancy. GPS + RTK positioning.",
    specs: {size:"10\"",weight:"~3.2kg",payload:"2kg",voltage:"8S"},
    tags: ["cinelifter","x8","cinema-camera","rtk"],
    cost: "$900–$1400", model: "MDL-1005"
  },
  {
    name: "Stealth Hawk 5\" NDAA",
    cat: "defense", difficulty: "advanced",
    desc: "NDAA-compliant 5\" FPV build using only Blue UAS Framework components. CubePilot FC, US-made frame, encrypted video link. Field-deployable.",
    specs: {size:"5\"",weight:"~750g",flight:"6-8 min",compliance:"NDAA 848"},
    tags: ["ndaa","blue-uas","encrypted","field-ready"],
    cost: "$600–$850", model: "MDL-1006"
  },
  {
    name: "First Flight 5\" Beginner",
    cat: "beginner", difficulty: "beginner",
    desc: "Your first custom build. Forgiving components, analog video, detailed build guide included. Fly manual or use angle mode while learning.",
    specs: {size:"5\"",weight:"~600g",flight:"6-8 min",voltage:"4S"},
    tags: ["beginner","analog","angle-mode","budget"],
    cost: "$150–$220", model: "MDL-1007"
  },
  {
    name: "CineMaster 7\" Cinema",
    cat: "cinema", difficulty: "advanced",
    desc: "Smooth 7\" cinema platform with ND-filter-ready GoPro mount. Low-KV motors and large props for buttery cinematic footage. GPS for waypoints.",
    specs: {size:"7\"",weight:"~900g",flight:"12-18 min",voltage:"6S"},
    tags: ["cinema","gopro","smooth","waypoints"],
    cost: "$450–$580", model: "MDL-1008"
  },
  {
    name: "ThunderBolt 5\" Power",
    cat: "freestyle", difficulty: "intermediate",
    desc: "High-power freestyle with oversized motors and aggressive props. Maximum punch-outs and vertical performance. Not for the faint-hearted.",
    specs: {size:"5\"",weight:"~700g",flight:"4-6 min",voltage:"6S"},
    tags: ["freestyle","high-power","punch","aggressive"],
    cost: "$350–$430", model: "MDL-1009"
  },
  {
    name: "Nomad Explorer 7\" Ultra LR",
    cat: "longrange", difficulty: "advanced",
    desc: "Ultra-long-range 7\" with dual battery, ArduPilot autopilot, and 4G LTE backup link. Built for 30+ km missions with failsafe return-to-home.",
    specs: {size:"7\"",weight:"~1.1kg",flight:"35-45 min",voltage:"6S"},
    tags: ["ultra-lr","ardupilot","4g-lte","dual-battery"],
    cost: "$600–$800", model: "MDL-1010"
  },
  {
    name: "Guardian ISR Platform",
    cat: "defense", difficulty: "advanced",
    desc: "NDAA-compliant ISR quad with thermal camera, encrypted mesh radio, and TAK integration. Designed for persistent surveillance and tactical overwatch.",
    specs: {size:"8\"",weight:"~2.5kg",flight:"25-35 min",compliance:"NDAA 848 + Blue UAS"},
    tags: ["ndaa","isr","thermal","tak","mesh"],
    cost: "$2,500–$4,000", model: "MDL-1011"
  }
];

function render(cat) {
  var g = document.getElementById('builds-grid');
  g.innerHTML = '';
  BUILDS.forEach(function(b) {
    if (cat !== 'all' && b.cat !== cat) return;
    var specHtml = '';
    for (var k in b.specs) {
      specHtml += '<div class="spec"><b>' + k + '</b> ' + b.specs[k] + '</div>';
    }
    var tagHtml = b.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
    var dc = b.difficulty === 'beginner' ? 'badge-beginner' : b.difficulty === 'intermediate' ? 'badge-intermediate' : 'badge-advanced';
    var ndaa = b.cat === 'defense' ? ' <span class="badge badge-ndaa">NDAA</span>' : '';
    g.innerHTML += '<div class="card" data-cat="' + b.cat + '">' +
      '<div class="card-top"><div class="card-name">' + b.name + '</div><div><span class="badge ' + dc + '">' + b.difficulty + '</span>' + ndaa + '</div></div>' +
      '<div class="card-desc">' + b.desc + '</div>' +
      '<div class="card-specs">' + specHtml + '</div>' +
      '<div class="card-tags">' + tagHtml + '</div>' +
      '<div class="card-footer"><span class="cost">' + b.cost + '</span>' +
      '<a class="btn-build" href="/builder/">Open in Builder</a></div></div>';
  });
}

document.querySelectorAll('.filter-pill').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-pill').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    render(btn.dataset.cat);
  });
});

render('all');
</script>
</body>
</html>
