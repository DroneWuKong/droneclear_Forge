<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse — Forge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
<style>
:root {
    --bg: #0c0c0a;
    --bg-card: #141410;
    --border: #1e1e18;
    --border-hi: #2e2e26;
    --text: #b8b0a0;
    --text-dim: #6b6358;
    --text-bright: #f5f0e8;
    --accent: #f59e0b;
    --accent-dim: rgba(245,158,11,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', system-ui, sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { overflow:auto !important; height:auto !important; }
body { font-family:var(--sans); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; min-height:100vh; overflow:auto !important; -webkit-overflow-scrolling:touch; }

/* ── Nav bar ── */
.browse-nav { display:flex; align-items:center; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); background:rgba(12,12,10,0.97); backdrop-filter:blur(12px); position:sticky; top:44px; z-index:100; }
.browse-back { background:none; border:1px solid var(--border); border-radius:8px; color:var(--text-dim); padding:8px 10px; cursor:pointer; display:flex; align-items:center; font-size:16px; transition:border-color 0.15s; }
.browse-back:hover { border-color:var(--accent); color:var(--accent); }
.browse-title { font-family:var(--mono); font-size:14px; font-weight:600; color:var(--text-bright); }
.browse-crumb { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
.browse-nav-right { margin-left:auto; display:flex; gap:8px; }
.browse-nav-right a { color:var(--text-dim); font-size:18px; text-decoration:none; padding:6px; }

/* ── Grid ── */
.browse-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(140px, 1fr)); gap:10px; padding:16px; }
.browse-card { display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg-card); border:1px solid var(--border); border-radius:10px; padding:20px 12px; text-decoration:none; color:inherit; cursor:pointer; transition:border-color 0.15s, transform 0.15s; text-align:center; min-height:100px; }
.browse-card:hover { border-color:var(--accent); transform:translateY(-1px); }
.browse-card:active { transform:scale(0.98); }
.browse-card i { font-size:24px; color:var(--accent); margin-bottom:8px; }
.browse-card-count { font-family:var(--mono); font-size:1.6rem; font-weight:700; color:var(--text-bright); line-height:1; }
.browse-card-label { font-family:var(--mono); font-size:0.6rem; color:var(--text-dim); letter-spacing:0.06em; text-transform:uppercase; margin-top:6px; line-height:1.3; }

/* ── Sub-group cards (smaller) ── */
.browse-grid.sub-grid { grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); }
.sub-grid .browse-card { padding:14px 10px; min-height:80px; }
.sub-grid .browse-card-count { font-size:1.2rem; }

/* ── Component list ── */
.browse-toolbar { display:flex; gap:8px; padding:12px 16px; flex-wrap:wrap; align-items:center; border-bottom:1px solid var(--border); }
.browse-search { flex:1; min-width:200px; padding:10px 14px; font-family:var(--mono); font-size:13px; color:var(--text); background:var(--bg-card); border:1px solid var(--border); border-radius:8px; outline:none; }
.browse-search:focus { border-color:var(--accent); }
.browse-search::placeholder { color:var(--text-dim); }
.browse-filter { padding:8px 12px; font-family:var(--mono); font-size:11px; color:var(--text); background:var(--bg-card); border:1px solid var(--border); border-radius:6px; cursor:pointer; appearance:none; -webkit-appearance:none; }
.browse-filter.active { border-color:var(--accent); color:var(--accent); }
.browse-sort { padding:8px 12px; font-family:var(--mono); font-size:11px; color:var(--text); background:var(--bg-card); border:1px solid var(--border); border-radius:6px; }
.browse-filter-clear { background:none; border:none; font:500 11px var(--mono); color:var(--text-dim); cursor:pointer; padding:6px 10px; border-radius:5px; }
.browse-filter-clear:hover { color:#ef4444; }
/* ── Spec badges on cards ── */
.spec-tags { display:flex; flex-wrap:wrap; gap:3px; margin-top:5px; }
.spec-tag { font:500 9px var(--mono); color:var(--text-dim); background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:1px 5px; white-space:nowrap; }

.browse-list { padding:8px 16px; }
.browse-item { display:flex; align-items:center; gap:12px; padding:12px; background:var(--bg-card); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; cursor:pointer; transition:border-color 0.15s; }
.browse-item:hover { border-color:var(--accent); }
.browse-item:active { transform:scale(0.995); }
.browse-item-img { width:48px; height:48px; border-radius:6px; background:var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; overflow:hidden; }
.browse-item-img img { width:100%; height:100%; object-fit:cover; }
.browse-item-img i { font-size:20px; color:var(--text-dim); }
.browse-item-info { flex:1; min-width:0; }
.browse-item-name { font-size:13px; font-weight:600; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.browse-item-mfr { font-size:11px; color:var(--text-dim); }
.browse-item-pid { font-family:var(--mono); font-size:10px; color:var(--text-dim); }
.browse-item-price { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--accent); white-space:nowrap; }
.browse-item-add { background:none; border:1px solid var(--border); border-radius:50%; width:32px; height:32px; color:var(--accent); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; transition:background 0.15s; }
.browse-item-add:hover { background:var(--accent-dim); }

/* ── View-mode toggle (grid / list / rows) ── */
.browse-view-toggle { display:inline-flex; border:1px solid var(--border); border-radius:6px; overflow:hidden; flex-shrink:0; }
.browse-view-toggle button { background:none; border:none; color:var(--text-dim); padding:8px 10px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; transition:background 0.15s,color 0.15s; border-right:1px solid var(--border); }
.browse-view-toggle button:last-child { border-right:none; }
.browse-view-toggle button.active { background:var(--accent-dim); color:var(--accent); }
.browse-view-toggle button:hover:not(.active) { color:var(--text-bright); }

/* Grid mode: product cards */
.browse-list.view-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:10px; padding:12px 16px; }
.browse-list.view-grid .browse-item { flex-direction:column; align-items:stretch; margin-bottom:0; padding:10px; text-align:left; }
.browse-list.view-grid .browse-item-img { width:100%; height:120px; border-radius:6px; margin-bottom:8px; }
.browse-list.view-grid .browse-item-img i { font-size:32px; }
.browse-list.view-grid .browse-item-info { width:100%; }
.browse-list.view-grid .browse-item-name { white-space:normal; overflow:visible; text-overflow:clip; font-size:12px; line-height:1.3; }
.browse-list.view-grid .browse-item-add { position:absolute; bottom:10px; right:10px; }
.browse-list.view-grid .browse-item { position:relative; padding-bottom:40px; }

/* Rows mode: list with no photos */
.browse-list.view-rows .browse-item-img { display:none; }
.browse-list.view-rows .browse-item { padding:10px 12px; }

.browse-empty { text-align:center; padding:40px 20px; color:var(--text-dim); font-size:13px; }

/* ── Detail modal ── */
.browse-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:200; display:none; }
.browse-modal-bg.open { display:flex; align-items:flex-end; justify-content:center; }
.browse-modal { background:var(--bg-card); border:1px solid var(--border); border-radius:16px 16px 0 0; width:100%; max-width:500px; max-height:85vh; overflow-y:auto; padding:20px; }
.browse-modal-close { background:none; border:none; color:var(--text-dim); font-size:22px; cursor:pointer; float:right; padding:4px; }
.browse-modal img { width:100%; max-height:250px; object-fit:contain; border-radius:8px; background:#fff; margin-bottom:12px; }
.browse-modal h3 { font-size:18px; color:var(--text-bright); margin-bottom:4px; }
.browse-modal .modal-mfr { font-size:12px; color:var(--text-dim); margin-bottom:8px; }
.browse-modal .modal-pid { font-family:var(--mono); font-size:11px; color:var(--text-dim); }
.browse-modal .modal-desc { font-size:13px; line-height:1.6; color:var(--text); margin:12px 0; }
.browse-modal .modal-price { font-family:var(--mono); font-size:18px; color:var(--accent); font-weight:700; }
.browse-modal .modal-specs { margin:12px 0; }
.browse-modal .modal-spec { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); font-size:12px; }
.browse-modal .modal-spec-key { color:var(--text-dim); text-transform:uppercase; font-family:var(--mono); font-size:10px; letter-spacing:0.05em; }
.browse-modal .modal-spec-val { color:var(--text-bright); font-weight:500; }

@media (max-width:400px) {
    .browse-grid { grid-template-columns:repeat(2, 1fr); gap:8px; padding:12px; }
    .browse-card { padding:14px 8px; min-height:85px; }
    .browse-card-count { font-size:1.3rem; }
}

/* PIE intelligence flags */
.pie-flags { margin-top:14px; display:flex; flex-direction:column; gap:6px; }
.pie-flag { padding:8px 10px; border-radius:6px; border-left:3px solid; font-size:11px; line-height:1.5; }
.pie-flag-title { font:700 11px var(--mono); margin-bottom:3px; }
.pie-flag-detail { color:var(--text-dim); font-size:10px; line-height:1.4; }
.pie-flag.critical { border-color:#ef4444; background:rgba(239,68,68,.07); }
.pie-flag.critical .pie-flag-title { color:#ef4444; }
.pie-flag.high    { border-color:#f97316; background:rgba(249,115,22,.07); }
.pie-flag.high    .pie-flag-title { color:#f97316; }
.pie-flag.warning { border-color:#f59e0b; background:rgba(245,158,11,.07); }
.pie-flag.warning .pie-flag-title { color:#f59e0b; }
.pie-flag.info    { border-color:#60a5fa; background:rgba(96,165,250,.07); }
.pie-flag.info    .pie-flag-title { color:#60a5fa; }
.pie-flags-header { font:700 10px var(--mono); letter-spacing:.08em; color:var(--text-dim); margin-bottom:4px; text-transform:uppercase; }

/* ── Global search ── */
.global-search-wrap { padding:12px 16px 0; }
.global-search { width:100%; padding:12px 16px 12px 42px; font-family:var(--mono); font-size:13px; color:var(--text); background:var(--bg-card); border:1px solid var(--border); border-radius:10px; outline:none; transition:border-color 0.15s; }
.global-search:focus { border-color:var(--accent); }
.global-search::placeholder { color:var(--text-dim); }
.global-search-icon { position:absolute; left:28px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:16px; pointer-events:none; }
.global-search-container { position:relative; }
.global-search-meta { font:500 11px var(--mono); color:var(--text-dim); padding:6px 16px 10px; }
.global-search-cat-badge { display:inline-block; font:600 10px var(--mono); padding:2px 6px; background:rgba(78,205,196,.08); border:1px solid rgba(78,205,196,.2); border-radius:4px; color:var(--accent); margin-left:6px; white-space:nowrap; vertical-align:middle; letter-spacing:.04em; text-transform:uppercase; }
</style>
<style id="global-mobile-fix">
@media(max-width:640px){
  *{max-width:100%;box-sizing:border-box}
  img,video,iframe{max-width:100%!important}
  [style*="grid-template-columns:1fr 1fr"],[style*="grid-template-columns: 1fr 1fr"]{grid-template-columns:1fr!important}
  [style*="grid-template-columns:repeat(3"],[style*="grid-template-columns: repeat(3"]{grid-template-columns:1fr 1fr!important}
  [style*="grid-template-columns:repeat(4"],[style*="grid-template-columns: repeat(4"]{grid-template-columns:1fr 1fr!important}
  .an-stats,.stat-grid,.stats-grid,.score-grid{grid-template-columns:repeat(2,1fr)!important}
  .content{padding:12px!important}
  .modal,.pred-modal,.flag-detail,[class*="-modal"]{width:calc(100vw - 24px)!important;max-width:calc(100vw - 24px)!important}
  .an-grid-2,.an-grid-3{grid-template-columns:1fr!important}
}
</style>
</head>

.dc-drawer-item:hover{color:#b8b0a0;background:rgba(255,255,255,.02);border-left-color:#2e2e26}
.dc-drawer-item.dc-active{color:#22c55e;border-left-color:#22c55e;background:rgba(34,197,94,.04)}
.dc-drawer-item.dc-ext{color:#3e3e34}
.dc-drawer-item.dc-ext:hover{color:#6b6358}
.dc-drawer-divider{height:1px;background:#1e1e18;margin:8px 16px}
#dc-drawer-foot{padding:16px;border-top:1px solid #1e1e18;font:400 10px 'JetBrains Mono',monospace;color:#3e3e34;flex-shrink:0}#dc-drawer-body{flex:1;overflow-y:auto;overflow-x:hidden}
</style>

<script>
(function(){
  var path = location.pathname.replace(/\/$/, '').split('/').pop() || 'home';
  var isPro = (function(){
    try {
      var tok = localStorage.getItem('forge_token') || localStorage.getItem('wingman_sub_token') || '';
      if(!tok || tok.length < 20) return false;
      var p = JSON.parse(atob(tok.split('.')[1] || tok));
      var payload = p.payload || p;
      return !!(payload.tier && payload.tier !== 'free' && (!payload.exp || payload.exp > Date.now()));
    } catch(e){ return false; }
  })();
  var host = location.hostname;
  var isForge = host.includes('builditmyself') || host.includes('forgeprole') || host === 'localhost' || host === '127.0.0.1';
  var isPIE   = host.includes('findoutmyself') || host.includes('nvmillfindout') || host.includes('uas-intel');

  // Set page label
  var labels = {
    'browse':'Browse','wingman':'Wingman','intel':'Intel Hub','compare':'Compare',
    'compliance':'Compliance','dossier':'Dossier','platforms':'Platforms','regs':'Regs',
    'stack-builder':'Stack Builder','report':'Compliance Report','tools-home':'Tools',
    'industry':'Industry','tracker':'Contract Tracker','patterns-home':'P.I.E Hub',
    'brief':'Brief','patterns':'Flags','clock':'UAS Clock','ddg':'DDG Tracker',
    'pro':'Pro','start':'Getting Started','grants':'Grants','waiver':'Doc Builder',
    'verify':'Verify','vault':'Vault','troubleshoot':'Troubleshoot'
  };
  var pageEl = document.getElementById('dc-nav-page');
  if(pageEl) pageEl.textContent = labels[path] || document.title.split('—')[0].trim().split('·')[0].trim() || path;

  // Brand link — goes to home of current domain
  // Set brand name: Forge / Patterns / Patterns Pro
  var brandName = isForge ? 'Forge' : isPIE ? 'Patterns' : 'UAS-';
  var brandEl = document.getElementById('dc-nav-brand');
  var drawerBrandEl = document.getElementById('dc-drawer-brand');
  if(brandEl) brandEl.textContent = brandName;
  if(drawerBrandEl) drawerBrandEl.textContent = brandName;

  window.dcNavBrandClick = function(e){
    e.preventDefault();
    location.href = isForge ? 'https://uas-forge.com/' : isPIE ? 'https://uas-intel.com/patterns-home/' : '/';
  };



  // Mark active drawer items
  document.querySelectorAll('.dc-drawer-item').forEach(function(a){
    if(a.dataset.page === path) a.classList.add('dc-active');
  });

  // Hamburger toggle
  window.dcNavToggle = function(){

    document.getElementById('dc-overlay').classList.toggle('open', open);
    document.getElementById('dc-hamburger').classList.toggle('open', open);
  };
  window.dcNavClose = function(){
    document.getElementById('dc-drawer').classList.remove('open');
    document.getElementById('dc-overlay').classList.remove('open');
    document.getElementById('dc-hamburger').classList.remove('open');
  };

})();
</script>

<script>
(function() {

    function esc(s) {

            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')

    const SKIP_KEYS = new Set(['pid','name','description','link','links','image_file','approx_price',

        {k:'firmware_compat',      label:'Firmware',  fmt: v => Array.isArray(v) ? v.join(', ') : v},
        {k:'firmware',             label:'Firmware',  fmt: v => v},
        {k:'kv',                   label:'KV',        fmt: v => v + ' KV'},
        {k:'kv_rating',            label:'KV',        fmt: v => v + ' KV'},
        {k:'stator_size',          label:'Stator',    fmt: v => v},
        {k:'continuous_current_a', label:'Continuous', fmt: v => v + 'A'},
        {k:'esc_current_a',        label:'Current',   fmt: v => v + 'A'},
        {k:'capacity_mah',         label:'Capacity',  fmt: v => v + ' mAh'},
        {k:'cell_count',           label:'Cell Count', fmt: v => v + 'S'},
        {k:'voltage_nominal_v',    label:'Voltage',   fmt: v => v + 'V'},
        {k:'frequency_ghz',        label:'Frequency', fmt: v => v + ' GHz'},
        {k:'diameter_in',          label:'Diameter',  fmt: v => v + '"'},
        {k:'blade_count',          label:'Blades',    fmt: v => v},
        {k:'resolution_h',         label:'Resolution',fmt: v => v + 'px'},
        {k:'accuracy_cm',          label:'Accuracy',  fmt: v => '±' + v + ' cm'},
        {k:'range_m',              label:'Range',     fmt: v => v + ' m'},
        {k:'ai_compute_tops',      label:'AI Compute',fmt: v => v + ' TOPS'},
        {k:'price_note',           label:'Pricing',   fmt: v => v},
    ];
    const PRIORITY_KEYS = new Set(PRIORITY_FIELDS.map(f => f.k));
    const catIcons = {
        antennas:'ph-broadcast', batteries:'ph-battery-full', escs:'ph-lightning',
        flight_controllers:'ph-cpu', fpv_cameras:'ph-camera', frames:'ph-frame-corners',
        gps_modules:'ph-map-pin', motors:'ph-gear-six', propellers:'ph-fan',
        receivers:'ph-radio', stacks:'ph-stack', video_transmitters:'ph-monitor-play',
        mesh_radios:'ph-wifi-high', build_guides:'ph-list-checks', drone_models:'ph-drone',
        integrated_stacks:'ph-circuit-board',
        lidar:'ph-scan', thermal_cameras:'ph-thermometer-hot',
        sensors:'ph-compass', counter_uas:'ph-shield-warning', esad:'ph-target',
        fpv_detectors:'ph-radio-button', payload_droppers:'ph-parachute',
        video_scramblers:'ph-lock-key', control_link_tx:'ph-broadcast',
        ai_accelerators:'ph-brain', c2_datalinks:'ph-network', companion_computers:'ph-device-mobile',
        ew_systems:'ph-wave-sine', ground_control_stations:'ph-monitor', lidar_rangefinders:'ph-scan',
        military_firmware:'ph-code', navigation_pnt:'ph-navigation', optical_flow:'ph-eye',
        propulsion:'ph-engine', swarm_software:'ph-swarm',
    };
    const catLabels = {
        antennas:'Antennas', batteries:'Batteries', escs:'ESCs',
        flight_controllers:'Flight Controllers', fpv_cameras:'FPV Cameras', frames:'Frames',
        gps_modules:'GPS Modules', motors:'Motors', propellers:'Propellers',
        receivers:'Receivers', stacks:'Stacks', video_transmitters:'Video Transmitters',
        mesh_radios:'Mesh Radios',
        integrated_stacks:'Integrated FC + Compute',
        lidar:'LiDAR & Mapping', thermal_cameras:'Thermal Cameras',
        sensors:'Sensors', counter_uas:'Counter-UAS', esad:'ESAD',
        fpv_detectors:'FPV Detectors', payload_droppers:'Payload Droppers',
        video_scramblers:'Video Scramblers', control_link_tx:'Control Link TX',
    };
    // Best sub-group field per category
    const subGroupField = {
        antennas:'frequency_ghz', batteries:'cell_count', escs:'size_class',
        flight_controllers:'mcu_family', fpv_cameras:'video_system', frames:'size_class',
        motors:'size_class', propellers:'size_class', receivers:'protocol',
        stacks:'size_class', video_transmitters:'video_system', mesh_radios:'manufacturer',
        integrated_stacks:'subcategory',
        lidar:'subcategory', thermal_cameras:'manufacturer',
        sensors:'subcategory', counter_uas:'subcategory', esad:'subcategory',
        fpv_detectors:'manufacturer', payload_droppers:'manufacturer',
        video_scramblers:'manufacturer', control_link_tx:'manufacturer',
    };
    const subGroupLabel = {
        frequency_ghz:'Frequency', cell_count:'Cell Count', size_class:'Size Class',
        mcu_family:'MCU Family', video_system:'Video System', protocol:'Protocol',
        manufacturer:'Manufacturer', subcategory:'Type',
    };

    let allCategories = [];
    let allComponents = {};
    let pieFlags = [];      // all PIE flags
    let pieByCat = {};      // category slug → flags[]
    let pieByComp = {};     // component_id slug → flags[]
    let navStack = []; // [{view, title, crumb}]
    let currentParts = [];
    let currentCat = null;
    let ndaaFilter = 'all'; // 'all' | 'ndaa' | 'non-ndaa' | 'china' | 'usa'
    // View mode: 'grid' (product cards), 'list' (row with image), 'rows' (no images)
    let viewMode = (function(){
        try { return localStorage.getItem('browse-view') || 'grid'; } catch(e) { return 'grid'; }
    })();
    function setViewMode(mode) {
        viewMode = mode;
        try { localStorage.setItem('browse-view', mode); } catch(e) {}
        const container = document.getElementById('list-items');
        if (container) {
            container.classList.remove('view-grid','view-list','view-rows');
            container.classList.add('view-' + mode);
        }
        document.querySelectorAll('.browse-view-toggle button').forEach(b => {
            b.classList.toggle('active', b.dataset.mode === mode);
        });
    }

    const content = document.getElementById('browse-content');
    const titleEl = document.getElementById('browse-title');
    const crumbEl = document.getElementById('browse-crumb');
    const modal = document.getElementById('detail-modal');
    const modalContent = document.getElementById('detail-content');

    // Check URL params
    const params = new URLSearchParams(window.location.search);
    const startView = params.get('view') || 'categories'; // 'categories' or 'components'
    const startCat = params.get('category');

    document.addEventListener('DOMContentLoaded', init);

    async function init() {
        try {
            const catRes = await fetch('/api/categories/');
            allCategories = await catRes.json();

            // Load PIE flags (non-blocking — best effort)
            try {
                const pieRes = await fetch('/api/data?type=pie_flags');
                pieFlags = await pieRes.json();
                // Build lookup indexes
                const CAT_SLUGS = new Set(Object.keys(catIcons));
                for (const f of pieFlags) {
                    const cid = f.component_id;
                    if (!cid) continue;
                    if (CAT_SLUGS.has(cid)) {
                        if (!pieByCat[cid]) pieByCat[cid] = [];
                        pieByCat[cid].push(f);
                    } else {
                        if (!pieByComp[cid]) pieByComp[cid] = [];
                        pieByComp[cid].push(f);
                    }
                }
            } catch(e) { /* PIE flags unavailable — continue without */ }

            if (startCat) {
                const parts = await loadCategory(startCat);
                showList(parts, catLabels[startCat] || startCat, startCat);
            } else {
                showCategories();
            }

            // Background preload all categories for global search
            // Fire-and-forget: load all slugs silently after initial render
            setTimeout(async () => {
                for (const c of allCategories) {
                    if (!allComponents[c.slug]) {
                        try { await loadCategory(c.slug); } catch(e) {}
                    }
                }
                // Update placeholder with real count
                const input = document.getElementById('global-search-input');
                if (input) {
                    const total = Object.values(allComponents).reduce((s, a) => s + a.length, 0);
                    input.placeholder = `Search ${total.toLocaleString()}+ parts across all categories...`;
                }
            }, 800);
        } catch(e) {
            content.innerHTML = '<div class="browse-empty">Could not load data.</div>';
        }
    }

    async function loadCategory(slug) {
        if (allComponents[slug]) return allComponents[slug];
        const res = await fetch('/api/components/?category=' + slug);
        const data = await res.json();
        const parts = data.map(p => ({ ...p, ...(p.schema_data || {}) }));
        allComponents[slug] = parts;
        return parts;
    }

    function pushNav(view, title, crumb) {
        navStack.push({view, title, crumb});
        titleEl.textContent = title;
        crumbEl.textContent = crumb || '';
    }

    window.goBack = function() {
        if (navStack.length <= 1) {
            window.location.href = '/';
            return;
        }
        navStack.pop();
        const prev = navStack[navStack.length - 1];
        prev.view();
    };

    // ── VIEW: Categories grid ──
    function showCategories() {
        navStack = [];
        pushNav(showCategories, 'Parts Database', allCategories.length + ' categories');

        // Show global search bar
        const gsBar = document.getElementById('global-search-bar');
        if (gsBar) {
            gsBar.style.display = 'block';
            const totalParts = Object.values(allComponents).reduce((s, a) => s + a.length, 0);
            const input = document.getElementById('global-search-input');
            if (input) input.placeholder = `Search ${totalParts.toLocaleString()}+ parts across all categories...`;
        }

        content.innerHTML = '<div class="browse-grid">' +
            allCategories.map(c => {
                const icon = catIcons[c.slug] || 'ph-cube';
                const label = catLabels[c.slug] || c.name;
                return `<div class="browse-card" onclick="selectCategory('${c.slug}')">
                    <i class="ph ${icon}"></i>
                    <div class="browse-card-count">${c.count || 0}</div>
                    <div class="browse-card-label">${label}</div>
                </div>`;
            }).join('') + '</div>';
    }

    // Hide global search when entering a category
    function hideGlobalSearch() {
        const gsBar = document.getElementById('global-search-bar');
        if (gsBar) { gsBar.style.display = 'none'; }
        const input = document.getElementById('global-search-input');
        if (input) input.value = '';
        const meta = document.getElementById('global-search-meta');
        if (meta) meta.textContent = '';
    }

    // ── Global search logic ──
    let globalSearchTimeout = null;

    function runGlobalSearch(query) {
        const q = query.trim().toLowerCase();
        const meta = document.getElementById('global-search-meta');

        if (!q) {
            // Restore category grid
            showCategories();
            return;
        }

        // Search across all loaded categories
        const results = [];
        for (const [slug, parts] of Object.entries(allComponents)) {
            for (const p of parts) {
                const searchStr = [p.name, p.manufacturer, p.description, p.pid, p.tags?.join(' ')].filter(Boolean).join(' ').toLowerCase();
                if (searchStr.includes(q)) {
                    results.push({ ...p, _category: slug });
                }
            }
        }

        // Update meta
        const catLabel = catLabels;
        if (meta) meta.textContent = results.length === 0 ? 'No results' : `${results.length} result${results.length !== 1 ? 's' : ''}`;

        // Compute NDAA counts for filter pills
        const ndaaOk  = results.filter(p => p.ndaa_compliant === true).length;
        const ndaaBad = results.filter(p => p.ndaa_compliant === false).length;
        const china   = results.filter(p => (p.manufacturer_country||'').toLowerCase().includes('china')).length;
        const usa     = results.filter(p => ['usa','united states'].includes((p.manufacturer_country||'').toLowerCase())).length;

        // Get active NDAA filter from global state
        const activeNdaa = ndaaFilter || 'all';

        // Apply NDAA filter to results before rendering
        let filtered = results;
        if (activeNdaa === 'ndaa')     filtered = results.filter(p => p.ndaa_compliant === true);
        else if (activeNdaa === 'non-ndaa') filtered = results.filter(p => p.ndaa_compliant === false);
        else if (activeNdaa === 'china')    filtered = results.filter(p => (p.manufacturer_country||'').toLowerCase().includes('china'));
        else if (activeNdaa === 'usa')      filtered = results.filter(p => ['usa','united states'].includes((p.manufacturer_country||'').toLowerCase()));

        // Build NDAA pills HTML
        let pillsHtml = '';
        if (ndaaOk + ndaaBad > 0) {
            pillsHtml = `<div class="ndaa-pills" id="global-ndaa-pills" style="padding:0 16px 8px">
                <button class="ndaa-pill ${activeNdaa==='all'?'active-all':''}" data-ndaa="all">All (${results.length})</button>
                ${ndaaOk  ? `<button class="ndaa-pill ${activeNdaa==='ndaa'?'active-ndaa':''}" data-ndaa="ndaa">NDAA ✓ (${ndaaOk})</button>` : ''}
                ${ndaaBad ? `<button class="ndaa-pill ${activeNdaa==='non-ndaa'?'active-non':''}" data-ndaa="non-ndaa">Non-NDAA ✗ (${ndaaBad})</button>` : ''}
                ${china   ? `<button class="ndaa-pill ${activeNdaa==='china'?'active-cn':''}" data-ndaa="china">China (${china})</button>` : ''}
                ${usa     ? `<button class="ndaa-pill ${activeNdaa==='usa'?'active-us':''}" data-ndaa="usa">USA (${usa})</button>` : ''}
            </div>`;
        }

        // Hide category grid, show results list
        let html = pillsHtml + '<div class="browse-list">';
        if (filtered.length === 0) {
            html += `<div class="browse-empty"><i class="ph ph-magnifying-glass" style="font-size:32px;display:block;margin-bottom:8px;opacity:0.3"></i>No parts match "${query}"${activeNdaa !== 'all' ? ' with current filter' : ''}</div>`;
        } else {
            for (const p of filtered.slice(0, 100)) {
                const hasImg = p.image_file && !p.image_file.startsWith('data:');
                const price = p.price_usd ? '$' + parseFloat(p.price_usd).toLocaleString() : '';
                const catName = catLabels[p._category] || p._category;
                html += `<div class="browse-item" onclick="showDetail('${p.pid}','${p._category}')">
                    <div class="browse-item-img">
                        ${hasImg ? `<img src="${p.image_file}" alt="" loading="lazy">` : `<i class="ph ${catIcons[p._category] || 'ph-cube'}"></i>`}
                    </div>
                    <div class="browse-item-info">
                        <div class="browse-item-name">${p.name}<span class="global-search-cat-badge">${catName}</span></div>
                        <div class="browse-item-mfr">${p.manufacturer || ''}</div>
                        <div class="browse-item-pid">${p.pid}</div>
                    </div>
                    ${price ? `<div class="browse-item-price">${price}</div>` : ''}
                </div>`;
            }
            if (filtered.length > 100) {
                html += `<div class="browse-empty" style="padding:12px 20px">Showing 100 of ${filtered.length} results — refine your search</div>`;
            }
        }
        html += '</div>';
        content.innerHTML = html;

        // Wire up NDAA pills in global search results
        const pillsContainer = document.getElementById('global-ndaa-pills');
        if (pillsContainer) {
            pillsContainer.querySelectorAll('.ndaa-pill').forEach(btn => {
                btn.addEventListener('click', function() {
                    ndaaFilter = this.dataset.ndaa;
                    runGlobalSearch(query);
                });
            });
        }

        // Track search
        if (window.__forgeAnalytics) window.__forgeAnalytics.search(query, 'global', filtered.length);
    }

    // Wire up global search input
    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('global-search-input');
        if (!input) return;
        input.addEventListener('input', function() {
            clearTimeout(globalSearchTimeout);
            globalSearchTimeout = setTimeout(() => runGlobalSearch(this.value), 180);
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                this.value = '';
                ndaaFilter = 'all';
                showCategories();
            }
        });
    });

    window.selectCategory = async function(slug) {
        hideGlobalSearch();
        const parts = await loadCategory(slug);
        currentParts = parts;
        showList(parts, catLabels[slug] || slug, slug);
    };

    // ── VIEW: Sub-group cards (e.g. frequency bands for antennas) ──
    function showSubGroups(slug, parts, field) {
        const label = catLabels[slug] || slug;
        const fieldLabel = subGroupLabel[field] || field;
        pushNav(() => showSubGroups(slug, parts, field), label, 'by ' + fieldLabel);

        // Group parts by field value
        const groups = {};
        let noVal = 0;
        for (const p of parts) {
            const v = p[field];
            if (v !== undefined && v !== null && v !== '') {
                const key = String(v);
                groups[key] = (groups[key] || 0) + 1;
            } else {
                noVal++;
            }
        }

        // Sort groups by count desc
        const sorted = Object.entries(groups).sort((a,b) => b[1] - a[1]);

        let html = '<div class="browse-grid sub-grid">';
        // "All" card
        html += `<div class="browse-card" onclick="showFilteredList('${slug}', null, null)">
            <i class="ph ${catIcons[slug] || 'ph-cube'}"></i>
            <div class="browse-card-count">${parts.length}</div>
            <div class="browse-card-label">All ${label}</div>
        </div>`;

        for (const [val, count] of sorted) {
            const displayVal = field === 'frequency_ghz' ? val + ' GHz'
                : field === 'cell_count' ? val + 'S'
                : val;
            html += `<div class="browse-card" onclick="showFilteredList('${slug}', '${field}', '${val.replace(/'/g,"\\'")}')">
                <div class="browse-card-count">${count}</div>
                <div class="browse-card-label">${displayVal}</div>
            </div>`;
        }

        if (noVal > 0) {
            html += `<div class="browse-card" onclick="showFilteredList('${slug}', '${field}', '__none__')">
                <div class="browse-card-count">${noVal}</div>
                <div class="browse-card-label">Other</div>
            </div>`;
        }

        html += '</div>';
        content.innerHTML = html;
    }

    window.showFilteredList = async function(slug, field, val) {
        let parts = await loadCategory(slug);
        let subtitle = catLabels[slug] || slug;

        if (field && val) {
            if (val === '__none__') {
                parts = parts.filter(p => !p[field] && p[field] !== 0);
                subtitle += ' · Other';
            } else {
                parts = parts.filter(p => String(p[field]) === val);
                const displayVal = field === 'frequency_ghz' ? val + ' GHz'
                    : field === 'cell_count' ? val + 'S' : val;
                subtitle += ' · ' + displayVal;
            }
        }

        currentParts = parts;
        showList(parts, subtitle);
    };

    // Smart filters per category — show the most useful attribute filter
    const smartFilters = {
        antennas: [
            {field:'frequency_ghz', label:'Frequency', fmt: v => v + ' GHz'},

        ],

        ],

            {field:'mcu_family', label:'MCU'},
            {field:'firmware_targets', label:'Firmware'},

        ],

        ],

            {field:'size_class', label:'Size'},
        ],

        ],

            {field:'manufacturer', label:'Manufacturer'},
        ],

            {field:'manufacturer', label:'Manufacturer'},

        ],

    // ── Per-category spec filters (ported from Builder commit acf8f79) ──
    // type:'select' — enumerate unique values from data (exact match)
    // type:'buckets' — predefined ranges; buckets:[{l:label, t:testFn(val)}]
    // type:'derived' — compute a simplified key via derive(part), then exact match
    const FILTER_CFG = {
        motors: [
            { key:'kv_rating', label:'KV', type:'buckets', buckets:[
                {l:'< 1000',   t:v=>v<1000},
                {l:'1000–2000',t:v=>v>=1000&&v<2000},
                {l:'2000–3000',t:v=>v>=2000&&v<3000},
                {l:'3000+',    t:v=>v>=3000},
            ]},
            { key:'_stator', label:'Size', type:'derived',
                derive: p => p.stator_size ? String(p.stator_size).slice(0,2)+'xx' : null },
            { key:'cell_count_min', label:'Cells', type:'select', fmt:v=>`${v}S` },
            { key:'prop_size_max_in', label:'Prop', type:'select', fmt:v=>`${v}"` },
        ],
        escs: [
            { key:'motor_output_count', label:'Type', type:'select',
                fmt:v=>v===1||v==='1'?'Single':'4-in-1' },
            { key:'esc_firmware', label:'Firmware', type:'select' },
            { key:'continuous_current_per_motor_a', label:'Current', type:'buckets', buckets:[
                {l:'≤ 30A',  t:v=>v<=30},
                {l:'30–50A', t:v=>v>30&&v<=50},
                {l:'50–70A', t:v=>v>50&&v<=70},
                {l:'70A+',   t:v=>v>70},
            ]},
            { key:'cell_count_max', label:'Max Cells', type:'select', fmt:v=>`${v}S` },
        ],
        flight_controllers: [
            { key:'mcu_family', label:'MCU', type:'select' },
            { key:'mounting_pattern_mm', label:'Mount', type:'select', fmt:v=>`${v}mm` },
            { key:'_imu', label:'IMU', type:'derived',
                derive: p => {
                    const s = (p.imu||'').toLowerCase();
                    if (s.includes('icm42688')||s.includes('icm-42688')) return 'ICM42688';
                    if (s.includes('bmi270')) return 'BMI270';
                    if (s.includes('mpu6000')) return 'MPU6000';
                    if (s.includes('icm20689')) return 'ICM20689';
                    if (s.includes('tactical')) return 'Tactical-grade';
                    return p.imu||null;
                }},
            { key:'cell_count_max', label:'Max Cells', type:'select', fmt:v=>`${v}S` },
        ],
        stacks: [
            { key:'mcu_family', label:'MCU', type:'select' },
            { key:'cell_count_max', label:'Max Cells', type:'select', fmt:v=>`${v}S` },
            { key:'esc_current_a', label:'ESC Current', type:'buckets', buckets:[
                {l:'≤ 30A',  t:v=>v<=30},
                {l:'30–50A', t:v=>v>30&&v<=50},
                {l:'50–70A', t:v=>v>50&&v<=70},
                {l:'70A+',   t:v=>v>70},
            ]},
            { key:'is_aio', label:'Form', type:'select',
                fmt:v=>(v===true||v==='true')?'AIO':'Standalone' },
        ],
        frames: [
            { key:'prop_size_max_in', label:'Prop Size', type:'select', fmt:v=>`${v}"` },
            { key:'fc_mounting_patterns_mm', label:'FC Mount', type:'derived',
                derive: p => {
                    const arr = p.fc_mounting_patterns_mm;
                    if (!arr) return null;
                    const vals = Array.isArray(arr) ? arr : [arr];
                    return vals.map(v=>`${v}mm`).join('/');
                }},
        ],
        batteries: [
            { key:'cell_count', label:'Cells', type:'select', fmt:v=>`${v}S` },
            { key:'capacity_mah', label:'Capacity', type:'buckets', buckets:[
                {l:'< 1000mAh', t:v=>v<1000},
                {l:'1000–2000', t:v=>v>=1000&&v<2000},
                {l:'2000–4000', t:v=>v>=2000&&v<4000},
                {l:'4000mAh+',  t:v=>v>=4000},
            ]},
            { key:'_chem', label:'Chemistry', type:'derived',
                derive: p => {
                    const c = (p.chemistry||'').toLowerCase();
                    if (c.includes('lihv')) return 'LiHV';
                    if (c.includes('lipo')) return 'LiPo';
                    if (c.includes('sulfur')) return 'Li-S';
                    if (c.includes('semi')) return 'Semi-solid';
                    if (c.includes('ion')) return 'Li-Ion';
                    return p.chemistry||null;
                }},
        ],
        propellers: [
            { key:'_size', label:'Size', type:'derived',
                derive: p => {
                    const d = p.diameter_in;
                    if (d==null) return null;
                    if (d<=3) return '≤ 3"';
                    if (d<=5) return '3–5"';
                    if (d<=7) return '5–7"';
                    return '7"+';
                }},
            { key:'blade_count', label:'Blades', type:'select', fmt:v=>`${v}B` },
            { key:'pitch_in', label:'Pitch', type:'select', fmt:v=>`${v}p` },
        ],
        receivers: [
            { key:'protocol', label:'Protocol', type:'select' },
        ],
        video_transmitters: [
            { key:'video_system', label:'System', type:'select' },
        ],
        fpv_cameras: [
            { key:'video_system', label:'System', type:'select' },
        ],
        gps_modules: [
            { key:'size_class', label:'Size', type:'select' },
        ],
        antennas: [
            { key:'frequency_ghz', label:'Frequency', type:'select', fmt:v=>`${v}GHz` },
            { key:'polarization', label:'Polarization', type:'select' },
        ],
    };

    // ── Key spec badges shown on cards ──
    const CARD_SPECS = {
        motors:             p => [p.stator_size, p.kv_rating && `${p.kv_rating}KV`],
        escs:               p => [p.motor_output_count===4||p.motor_output_count==='4'?'4-in-1':'Single',
                                  p.continuous_current_per_motor_a && `${p.continuous_current_per_motor_a}A`],
        flight_controllers: p => [p.mcu_family, p.mounting_pattern_mm && `${p.mounting_pattern_mm}mm`],
        stacks:             p => [p.mcu_family, p.esc_current_a && `${p.esc_current_a}A`,
                                  (p.is_aio===true||p.is_aio==='true')?'AIO':null],
        frames:             p => [p.prop_size_max_in && `${p.prop_size_max_in}"`,
                                  p.wheelbase_mm && `${p.wheelbase_mm}mm`],
        batteries:          p => [p.cell_count && `${p.cell_count}S`, p.capacity_mah && `${p.capacity_mah}mAh`],
        propellers:         p => [p.diameter_in && `${p.diameter_in}"`,
                                  p.pitch_in && `${p.pitch_in}p`, p.blade_count && `${p.blade_count}B`],
        receivers:          p => [p.protocol, p.frequency_ghz && `${p.frequency_ghz}GHz`],
        video_transmitters: p => [p.video_system],
        fpv_cameras:        p => [p.video_system],
        gps_modules:        p => [p.constellations],
        antennas:           p => [p.frequency_ghz && `${p.frequency_ghz}GHz`, p.polarization],
    };

    function derivedVal(cfg, part) {
        if (cfg.type === 'derived') return cfg.derive(part);
        return part[cfg.key];
    }

    // Apply FILTER_CFG buckets/derived filters (state held in .spec-filter DOM values)
    function applySpecFilters(parts, catSlug) {
        const cfgs = FILTER_CFG[catSlug];
        if (!cfgs) return parts;
        const active = {};
        document.querySelectorAll('.spec-filter').forEach(el => {
            if (el.value) active[el.dataset.fk] = el.value;
        });
        if (!Object.keys(active).length) return parts;
        return parts.filter(p => {
            for (const cfg of cfgs) {
                const val = active[cfg.key];
                if (!val) continue;
                if (cfg.type === 'buckets') {
                    const bucket = cfg.buckets.find(b => b.l === val);
                    if (!bucket) continue;
                    const pv = p[cfg.key];
                    if (pv == null || !bucket.t(Number(pv))) return false;
                } else {
                    const pv = String(derivedVal(cfg, p) ?? '');
                    if (pv !== val) return false;
                }
            }
            return true;
        });
    }

    // ── VIEW: Component list with smart filters ──
    function showList(parts, title, catSlug) {
        currentParts = parts;
        currentCat = catSlug;
        pushNav(() => showList(parts, title, catSlug), title, parts.length + ' parts');

        // Get filterable manufacturers
        const mfrs = [...new Set(parts.map(p => p.manufacturer).filter(Boolean))].sort();
        const specCfgs = FILTER_CFG[catSlug];
        const filters = specCfgs ? [] : (smartFilters[catSlug] || []);

        const catLabel = catLabels[catSlug] || title;
        let html = '<div class="browse-toolbar">';
        html += `<input type="text" class="browse-search" id="list-search" placeholder="Search ${esc(catLabel.toLowerCase())}...">`;
        if (mfrs.length > 1) {
            html += `<select class="browse-filter" id="list-mfr" data-field="manufacturer"><option value="">Manufacturer (${mfrs.length})</option>`;
            mfrs.forEach(m => html += `<option value="${esc(m)}">${esc(m)}</option>`);
            html += '</select>';
        }
        // New per-category spec filters (ported from Builder commit acf8f79)
        if (specCfgs) {
            for (const cfg of specCfgs) {
                let options = '';
                if (cfg.type === 'buckets') {
                    // Only show buckets that have at least one matching part in this category
                    const counts = cfg.buckets.map(b => {
                        let n = 0;
                        for (const p of parts) {
                            const v = p[cfg.key];
                            if (v != null && b.t(Number(v))) n++;
                        }
                        return { b, n };
                    }).filter(x => x.n > 0);
                    if (counts.length < 2) continue;
                    options = counts.map(({b,n}) =>
                        `<option value="${esc(b.l)}">${esc(b.l)} (${n})</option>`
                    ).join('');
                } else {
                    const vals = new Map();
                    const counts = new Map();
                    for (const p of parts) {
                        const v = derivedVal(cfg, p);
                        if (v == null || v === '') continue;
                        const key = String(v);
                        const disp = cfg.fmt ? cfg.fmt(v) : key;
                        vals.set(key, disp);
                        counts.set(key, (counts.get(key)||0) + 1);
                    }
                    if (vals.size < 2) continue;
                    const sorted = [...vals.entries()].sort((a,b)=>a[0].localeCompare(b[0],undefined,{numeric:true}));
                    options = sorted.map(([k,d]) =>
                        `<option value="${esc(k)}">${esc(d)} (${counts.get(k)})</option>`
                    ).join('');
                }
                html += `<select class="browse-filter spec-filter" data-fk="${esc(cfg.key)}">
                    <option value="">${esc(cfg.label)}</option>${options}
                </select>`;
            }
        }
        // Legacy smart attribute filters (for categories without FILTER_CFG coverage)
        for (const filt of filters) {
            const vals = {};
            for (const p of parts) {
                const v = p[filt.field];
                if (v !== undefined && v !== null && v !== '') vals[String(v)] = (vals[String(v)]||0) + 1;
            }
            if (Object.keys(vals).length >= 2) {
                const sorted = Object.entries(vals).sort((a,b) => b[1] - a[1]);
                const id = 'list-sf-' + filt.field;
                html += `<select class="browse-filter smart-filter" id="${id}" data-field="${filt.field}"><option value="">${filt.label}</option>`;
                for (const [val, count] of sorted) {
                    const display = filt.fmt ? filt.fmt(val) : val;
                    html += `<option value="${val}">${display} (${count})</option>`;
                }
                html += '</select>';
            }
        }
        html += '<select class="browse-sort" id="list-sort" title="Sort order">'
              + '<option value="default">Sort: Default</option>'
              + '<option value="name">Name A → Z</option>'
              + '<option value="name-desc">Name Z → A</option>'
              + '<option value="mfr">Manufacturer</option>'
              + '<option value="price-asc">Price ↑</option>'
              + '<option value="price-desc">Price ↓</option>'
              + '</select>';
        html += '<div class="browse-view-toggle" role="tablist" aria-label="View mode">'
              + '<button type="button" data-mode="grid"  title="Grid view"><i class="ph ph-squares-four"></i></button>'
              + '<button type="button" data-mode="list"  title="List view"><i class="ph ph-list"></i></button>'
              + '<button type="button" data-mode="rows"  title="Compact (no photos)"><i class="ph ph-rows"></i></button>'
              + '</div>';
        if (specCfgs) {
            html += '<button type="button" class="browse-filter-clear" id="spec-filter-clear" title="Clear filters" style="display:none">✕ Clear</button>';
        }
        html += '<span class="browse-count" id="browse-count" style="margin-left:auto;font:600 11px var(--mono);color:var(--text-dim)"></span>';
        html += '</div>';
        html += `<div class="browse-list view-${viewMode}" id="list-items"></div>`;

        content.innerHTML = html;

        // Inject NDAA quick-filter pills above the toolbar
        const toolbar = content.querySelector('.browse-toolbar');
        if (toolbar) {
            const ndaaOk  = parts.filter(p => p.ndaa_compliant === true).length;
            const ndaaBad = parts.filter(p => p.ndaa_compliant === false).length;
            const china   = parts.filter(p => (p.manufacturer_country || '').toLowerCase().includes('china')).length;
            const usa     = parts.filter(p => ['usa','united states'].includes((p.manufacturer_country || '').toLowerCase())).length;
            if (ndaaOk + ndaaBad > 0) {
                const pillsDiv = document.createElement('div');
                pillsDiv.className = 'ndaa-pills';
                pillsDiv.id = 'ndaa-pills';
                pillsDiv.innerHTML =
                    `<button class="ndaa-pill active-all" data-ndaa="all">All (${parts.length})</button>` +
                    (ndaaOk  ? `<button class="ndaa-pill" data-ndaa="ndaa">NDAA ✓ (${ndaaOk})</button>` : '') +
                    (ndaaBad ? `<button class="ndaa-pill" data-ndaa="non-ndaa">Non-NDAA ✗ (${ndaaBad})</button>` : '') +
                    (china   ? `<button class="ndaa-pill" data-ndaa="china">China (${china})</button>` : '') +
                    (usa     ? `<button class="ndaa-pill" data-ndaa="usa">USA (${usa})</button>` : '');
                toolbar.parentNode.insertBefore(pillsDiv, toolbar);
                pillsDiv.querySelectorAll('.ndaa-pill').forEach(btn => btn.addEventListener('click', function() {
                    pillsDiv.querySelectorAll('.ndaa-pill').forEach(b => b.className = 'ndaa-pill');
                    const mode = this.dataset.ndaa;
                    this.classList.add('active-' + (mode === 'all' ? 'all' : mode === 'ndaa' ? 'ndaa' : mode === 'non-ndaa' ? 'non' : mode === 'china' ? 'cn' : 'us'));
                    ndaaFilter = mode;
                    applyListFilters();
                }));
            }
        }
        ndaaFilter = 'all';
        // Initial render via applyListFilters so the count + spec filter state are set up
        applyListFilters();

        // Wire up all filters
        document.getElementById('list-search')?.addEventListener('input', applyListFilters);
        document.getElementById('list-mfr')?.addEventListener('change', applyListFilters);
        document.getElementById('list-sort')?.addEventListener('change', applyListFilters);
        document.querySelectorAll('.smart-filter').forEach(el => el.addEventListener('change', applyListFilters));
        document.querySelectorAll('.spec-filter').forEach(el => el.addEventListener('change', applyListFilters));
        document.getElementById('spec-filter-clear')?.addEventListener('click', () => {
            document.querySelectorAll('.spec-filter').forEach(el => { el.value = ''; el.classList.remove('active'); });
            applyListFilters();
        });

        // View-mode toggle wiring — restores persisted mode and switches class
        document.querySelectorAll('.browse-view-toggle button').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === viewMode);
            btn.addEventListener('click', () => setViewMode(btn.dataset.mode));
        });
    }

    function applyListFilters() {
        const q = (document.getElementById('list-search')?.value || '').toLowerCase();
        const mfr = document.getElementById('list-mfr')?.value || '';
        const sort = document.getElementById('list-sort')?.value || 'default';

        let filtered = currentParts;
        if (q) filtered = filtered.filter(p => (p.name + ' ' + p.manufacturer + ' ' + p.description).toLowerCase().includes(q));
        // NDAA quick-filter
        if (ndaaFilter === 'ndaa')     filtered = filtered.filter(p => p.ndaa_compliant === true);
        else if (ndaaFilter === 'non-ndaa') filtered = filtered.filter(p => p.ndaa_compliant === false);
        else if (ndaaFilter === 'china')    filtered = filtered.filter(p => (p.manufacturer_country||'').toLowerCase().includes('china'));
        else if (ndaaFilter === 'usa')      filtered = filtered.filter(p => ['usa','united states'].includes((p.manufacturer_country||'').toLowerCase()));
        if (mfr) filtered = filtered.filter(p => p.manufacturer === mfr);

        // Apply smart filters (legacy, for categories without FILTER_CFG)
        document.querySelectorAll('.smart-filter').forEach(el => {
            const field = el.dataset.field;
            const val = el.value;
            if (val) filtered = filtered.filter(p => String(p[field]) === val);
        });

        // Apply per-category spec filters (FILTER_CFG, with buckets + derived)
        filtered = applySpecFilters(filtered, currentCat);

        // Style active spec filters and toggle clear button visibility
        let anySpecActive = false;
        document.querySelectorAll('.spec-filter').forEach(el => {
            const on = !!el.value;
            el.classList.toggle('active', on);
            if (on) anySpecActive = true;
        });
        const clrBtn = document.getElementById('spec-filter-clear');
        if (clrBtn) clrBtn.style.display = anySpecActive ? '' : 'none';

        const priceOf = p => {
            const v = p.price_usd ?? p.approx_price ?? p.approx_price_usd;
            const n = typeof v === 'number' ? v : parseFloat(String(v||'').replace(/[^\d.]/g,''));
            return isFinite(n) ? n : null;
        };
        if (sort === 'name')      filtered = [...filtered].sort((a,b) => (a.name||'').localeCompare(b.name||''));
        else if (sort === 'name-desc') filtered = [...filtered].sort((a,b) => (b.name||'').localeCompare(a.name||''));
        else if (sort === 'mfr')       filtered = [...filtered].sort((a,b) => (a.manufacturer||'').localeCompare(b.manufacturer||''));
        else if (sort === 'price-asc' || sort === 'price-desc') {
            const dir = sort === 'price-asc' ? 1 : -1;
            filtered = [...filtered].sort((a,b) => {
                const pa = priceOf(a), pb = priceOf(b);
                if (pa == null && pb == null) return 0;
                if (pa == null) return 1;   // missing prices sort to bottom
                if (pb == null) return -1;
                return (pa - pb) * dir;
            });
        }

        const total = currentParts.length;
        const cnt = document.getElementById('browse-count');
        if (cnt) cnt.textContent = filtered.length === total ? `${total} parts` : `${filtered.length} / ${total}`;

        renderList(filtered);
    }

    function renderList(parts) {
        const container = document.getElementById('list-items');
        if (!parts.length) {
            container.innerHTML = '<div class="browse-empty">No parts match your filters.</div>';
            return;
        }
        const specFn = currentCat && CARD_SPECS[currentCat];
        container.innerHTML = parts.map(p => {
            const hasImg = p.image_file && !p.image_file.startsWith('data:');
            const imgHtml = hasImg
                ? `<img src="${p.image_file}" alt="" loading="lazy">`
                : `<i class="ph ${catIcons[p.category] || 'ph-cube'}"></i>`;
            const tags = specFn
                ? specFn(p).filter(Boolean).map(s=>`<span class="spec-tag">${esc(String(s))}</span>`).join('')
                : '';
            return `<div class="browse-item" onclick="showDetail('${p.pid.replace(/'/g,"\\'")}', '${(p.category||'').replace(/'/g,"\\'")}')">
                <div class="browse-item-img">${imgHtml}</div>
                <div class="browse-item-info">
                    <div class="browse-item-name">${p.name || ''}</div>
                    <div class="browse-item-mfr">${p.manufacturer || ''}</div>
                    <div class="browse-item-pid">${p.pid || ''}</div>
                    ${tags ? `<div class="spec-tags">${tags}</div>` : ''}
                </div>
                <button class="browse-item-add" onclick="event.stopPropagation()" title="Add to build"><i class="ph ph-plus"></i></button>
            </div>`;
        }).join('');
    }

    // ── PIE flag lookup ──
    function getPieFlags(category, partName, manufacturer, ndaaCompliant) {
        const results = [];
        const seen = new Set();

        // Helper: slugify text for matching
        const slug = t => (t||'').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g,'');

        const partSlug = slug(partName);
        const mfrSlug = slug(manufacturer);

        // 1. Exact component_id match against part name or manufacturer slug
        for (const [cid, flist] of Object.entries(pieByComp)) {
            const cidClean = cid.replace(/[()]/g,'').replace(/\s/g,'-').toLowerCase();
            if (partSlug.includes(cidClean) || cidClean.includes(partSlug.split('-')[0]) ||
                mfrSlug.includes(cidClean) || cidClean.includes(mfrSlug.split('-')[0])) {
                for (const f of flist) {
                    if (!seen.has(f.id)) { seen.add(f.id); results.push(f); }
                }
            }
        }

        // 2. Category-level flags (max 2 most severe, skip pure info)
        const catFlags = (pieByCat[category] || [])
            .filter(f => f.severity !== 'info' && 
                         ['diversion_risk','supply_constraint','supply_chain_risk','grayzone','compliance'].includes(f.flag_type) &&
                         // Suppress supply_chain_risk and compliance for verified NDAA-compliant parts
                         !(ndaaCompliant === true && ['supply_chain_risk','compliance'].includes(f.flag_type)))
            .sort((a,b) => {
                const ord = {critical:0,high:1,warning:2,info:3};
                return (ord[a.severity]??3) - (ord[b.severity]??3);
            })
            .slice(0, 2);
        for (const f of catFlags) {
            if (!seen.has(f.id)) { seen.add(f.id); results.push(f); }
        }

        // Sort: critical first, then by type priority
        const typeOrd = {diversion_risk:0,grayzone:1,supply_constraint:2,supply_chain_risk:3,compliance:4};
        const sevOrd = {critical:0,high:1,warning:2,info:3};
        results.sort((a,b) => {
            const sd = (sevOrd[a.severity]??3) - (sevOrd[b.severity]??3);
            if (sd !== 0) return sd;
            return (typeOrd[a.flag_type]??9) - (typeOrd[b.flag_type]??9);
        });

        return results.slice(0, 4); // cap at 4 flags per part
    }

    function renderPieFlags(flags) {
        if (!flags.length) return '';
        const TYPE_ICON = {
            diversion_risk:'☢', supply_constraint:'⚠', supply_chain_risk:'🔗',
            grayzone:'⚡', compliance:'🛡', contract_signal:'📋',
            component_analysis:'🔍', price_anomaly:'💰', correlation:'🔄'
        };
        const items = flags.map(f => {
            const icon = TYPE_ICON[f.flag_type] || '●';
            const sev = f.severity || 'info';
            const detail = (f.detail||'').slice(0,160) + ((f.detail||'').length > 160 ? '…' : '');
            return `<div class="pie-flag ${sev}">
                <div class="pie-flag-title">${icon} ${f.title||''}</div>
                ${detail ? `<div class="pie-flag-detail">${detail}</div>` : ''}
            </div>`;
        }).join('');
        return `<div class="pie-flags"><div class="pie-flags-header">⬡ PIE Intelligence</div>${items}</div>`;
    }

    // ── Detail modal ──
    window.showDetail = async function(pid, category) {
        const parts = allComponents[category] || [];
        const p = parts.find(x => x.pid === pid);
        if (!p) return;

        const hasImg = p.image_file && !p.image_file.startsWith('data:');

        // Build specs — priority fields first, then remaining
        let specsHtml = '';
        const shownKeys = new Set();

        // Priority fields
        for (const {k, label, fmt, cls} of PRIORITY_FIELDS) {
            const v = p[k];
            if (v === null || v === undefined || v === '' || v === false && k !== 'ndaa_compliant') continue;
            let display = fmt ? fmt(v) : String(v);
            if (!display) continue;
            const valCls = cls ? cls(v) : '';
            const colorStyle = valCls === 'good' ? 'color:#22c55e' : valCls === 'bad' ? 'color:#ef4444' : 'color:var(--text-bright)';
            specsHtml += `<div class="modal-spec"><span class="modal-spec-key">${label}</span><span class="modal-spec-val" style="${colorStyle}">${display}</span></div>`;
            shownKeys.add(k);
        }

        // Remaining fields (not skipped, not already shown)
        for (const [k,v] of Object.entries(p)) {
            if (SKIP_KEYS.has(k) || PRIORITY_KEYS.has(k) || shownKeys.has(k)) continue;
            if (v === null || v === undefined || v === '' || typeof v === 'object') continue;
            const label = k.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
            specsHtml += `<div class="modal-spec"><span class="modal-spec-key">${label}</span><span class="modal-spec-val">${v}</span></div>`;
        }

        // Source resolution — check all possible source fields in priority order
        const sourceUrl = (p.links && p.links[0]) || p.link || p.product_url || p.datasheet_url
            || (p.source && p.source !== 'internal_archetype' && p.source !== 'null' && p.source !== null ? p.source : null)
            || null;
        const isArchetype = p.source === 'internal_archetype';
        const isUnverified = p.source_needed === true || (p.source === null && !isArchetype);
        const hasVerification = p.verification && p.verification.status;

        // Tags
        const tagsHtml = (p.tags && p.tags.length)
            ? '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:4px">'
              + p.tags.slice(0,8).map(t => `<span style="font:600 10px var(--mono);padding:2px 6px;background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.2);border-radius:4px;color:var(--accent)">${t}</span>`).join('')
              + '</div>'
            : '';

        // Source footer — always rendered at bottom of modal
        let sourceFooterHtml = '';
        if (isArchetype) {
            sourceFooterHtml = `<div style="margin-top:14px;padding:8px 10px;background:rgba(148,163,184,.06);border:1px solid rgba(148,163,184,.15);border-radius:6px;font-size:11px;color:var(--text-dim)">
                <i class="ph ph-cube"></i> Internal build archetype — no manufacturer. Reference only.
            </div>`;
        } else if (isUnverified) {
            sourceFooterHtml = `<div style="margin-top:14px;padding:8px 10px;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.25);border-radius:6px;font-size:11px;color:#fca5a5">
                <i class="ph ph-warning"></i> Source not verified — data may be incomplete or inaccurate. Do not use in procurement decisions without independent verification.
            </div>`;
        } else if (sourceUrl) {
            sourceFooterHtml = `<div style="margin-top:14px;padding:8px 10px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.15);border-radius:6px;display:flex;align-items:center;justify-content:space-between;gap:8px">
                <span style="font:500 11px var(--mono);color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${sourceUrl.replace(/^https?:\/\//,'')}</span>
                <a href="${sourceUrl}" target="_blank" rel="noopener" style="color:var(--accent);font:600 11px var(--mono);text-decoration:none;white-space:nowrap;flex-shrink:0">Source →</a>
            </div>`;
        }

        // Verification badge if audited
        const verificationHtml = (hasVerification && p.verification.status !== 'unverified')
            ? `<div style="margin-top:6px;display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:4px;font:600 10px var(--mono);color:#86efac">
                <i class="ph ph-seal-check"></i> AUDITED ${p.verification.audited_at || ''}
               </div>`
            : '';

        // Handbook cross-link — map category to relevant chapter
        const HANDBOOK_MAP = {
            flight_controllers: ['firmware/', 'Flight Controller Firmware'],
            escs: ['firmware/', 'Flight Controller Firmware'],
            mesh_radios: ['integration/', 'Mesh Networking'],
            antennas: ['fundamentals/', 'RF Fundamentals'],
            video_transmitters: ['fundamentals/', 'RF Fundamentals'],
            receivers: ['fundamentals/', 'RF Fundamentals'],
            control_link_tx: ['fundamentals/', 'RF Fundamentals'],
            gps_modules: ['integration/', 'GPS & Navigation'],
            lidar: ['integration/', 'Sensors & Autonomy'],
            lidar_rangefinders: ['integration/', 'Sensors & Autonomy'],
            optical_flow: ['integration/', 'Sensors & Autonomy'],
            companion_computers: ['integration/', 'Companion Computing'],
            ai_accelerators: ['integration/', 'AI & Computer Vision'],
            frames: ['fundamentals/', 'Airframe Fundamentals'],
            motors: ['fundamentals/', 'Propulsion'],
            propellers: ['fundamentals/', 'Propulsion'],
            batteries: ['fundamentals/', 'Power Systems'],
            fpv_cameras: ['fundamentals/', 'Video Systems'],
            thermal_cameras: ['integration/', 'Thermal & ISR'],
            ground_control_stations: ['integration/', 'Ground Control'],
        };
        const hb = HANDBOOK_MAP[category];
        const handbookHtml = hb ? `<a href="https://uas-handbook.com/${hb[0]}" target="_blank" rel="noopener" style="margin-top:10px;display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:6px;font:600 11px var(--mono);color:#60a5fa;text-decoration:none;transition:all .15s" onmouseover="this.style.background='rgba(59,130,246,.18)'" onmouseout="this.style.background='rgba(59,130,246,.08)'"><i class="ph ph-book-open"></i> Read in Handbook: ${hb[1]}</a>` : '';

        modalContent.innerHTML = `
            <button class="browse-modal-close" onclick="closeDetail()"><i class="ph ph-x"></i></button>
            ${hasImg ? `<img src="${p.image_file}" alt="${p.name}">` : ''}
            <h3>${p.name}</h3>
            <div class="modal-mfr">${p.manufacturer || ''}</div>
            <div class="modal-pid">${p.pid}</div>
            ${verificationHtml}
            ${p.description ? `<div class="modal-desc">${p.description}</div>` : ''}
            ${specsHtml ? `<div class="modal-specs">${specsHtml}</div>` : ''}
            ${tagsHtml}
            ${handbookHtml}
            ${p.ndaa_note ? `<div style="margin-top:10px;padding:8px 10px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.2);border-radius:6px;font-size:11px;color:var(--text-dim)">${p.ndaa_note}</div>` : ''}
            ${renderPieFlags(getPieFlags(category, p.name||'', p.manufacturer||'', p.ndaa_compliant))}
            ${sourceFooterHtml}
        `;
        modal.classList.add('open');
        modal.onclick = function(e) { if (e.target === modal) closeDetail(); };

        // Analytics: track component detail view
        if (window.__forgeAnalytics) window.__forgeAnalytics.view(p.pid, category, p.manufacturer || '', p.manufacturer_country || '', p.ndaa_compliant);
    };

    window.closeDetail = function() {
        modal.classList.remove('open');
    };
})();
</script>
